
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>登录 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#fff;max-width:375px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.status-bar{height:44px;background:#4A6CF7;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
.content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px}
.logo{width:80px;height:80px;background:linear-gradient(135deg,#4A6CF7,#7C5CF7);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.logo-text{color:#fff;font-size:28px;font-weight:700}
.app-name{font-size:24px;font-weight:600;color:#1a1a2e;margin-bottom:8px}
.app-desc{font-size:14px;color:#999;margin-bottom:60px}
.wx-btn{width:100%;height:48px;background:#07C160;color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.wx-btn:active{opacity:.85}
.wx-btn svg{width:22px;height:22px}
.skip-btn{background:none;border:none;color:#999;font-size:13px;cursor:pointer;margin-top:40px}
.skip-btn:active{color:#666}
.reset-btn{background:none;border:none;color:#FF6B35;font-size:12px;cursor:pointer;margin-top:14px}
.reset-btn:active{opacity:.7}
.phone-login{text-align:center;margin-top:20px}
.phone-login a{color:#4A6CF7;text-decoration:none;font-size:14px}
.test-panel{width:100%;margin-top:18px;padding:12px 14px;border-radius:14px;background:#f6f9ff;border:1px solid #dde6ff}
.test-label{font-size:12px;color:#667085;margin-bottom:8px}
.test-select{width:100%;height:38px;border:1px solid #d9deeb;border-radius:10px;background:#fff;color:#1a1a2e;padding:0 10px;font-size:13px}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="content">
  <div class="logo"><span class="logo-text">伴</span></div>
  <div class="app-name">伴行</div>
  <div class="app-desc">安全可靠的校园服务互助平台</div>
  <button class="wx-btn" onclick="startWechatLogin()">
    <svg viewBox="0 0 24 24" fill="#fff"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178A1.17 1.17 0 014.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178 1.17 1.17 0 01-1.162-1.178c0-.651.52-1.18 1.162-1.18zm3.2 4.127c-2.663 0-5.122.65-6.97 2.041-1.85 1.39-2.828 3.36-2.828 5.274 0 1.736.79 3.3 2.123 4.527l-.302 1.556a.504.504 0 00.218.448.48.48 0 00.248.067.5.5 0 00.262-.078l1.703-.924a9.34 9.34 0 002.636.372c.424 0 .84-.032 1.247-.084-.27-.667-.416-1.393-.416-2.154 0-3.39 3.295-6.14 7.356-6.14.386 0 .767.026 1.14.073-.583-2.543-3.244-4.478-6.317-4.478zm-2.24 3.095c.542 0 .982.446.982.997a.99.99 0 01-.982.997.99.99 0 01-.983-.997c0-.55.44-.997.983-.997zm5.043 0c.542 0 .982.446.982.997a.99.99 0 01-.982.997.99.99 0 01-.983-.997c0-.55.44-.997.983-.997z"/></svg>
    微信一键登录
  </button>
  <div class="test-panel">
    <div class="test-label">测试账号状态</div>
    <select class="test-select" id="testAccountStatus" onchange="saveLoginTestStatus()">
      <option value="active">正常账号</option>
      <option value="banned">封禁账号</option>
    </select>
  </div>
  <div class="phone-login"><a href="phone-bind.html">手机号登录 / 注册 &gt;</a></div>
  <button class="skip-btn" onclick="location.href='fuwuzhe_home.html'">暂不登录，先逛逛</button>
  <button class="reset-btn" onclick="resetAuthState()">测试：重置认证状态</button>
</div>
<script>
const testAccountStatus=document.getElementById('testAccountStatus');

function readAuthState(){
  try{return JSON.parse(localStorage.getItem('authState')||'{}')}catch(error){return {}}
}

function saveLoginTestStatus(){
  const authState=readAuthState();
  authState.accountStatus=testAccountStatus.value;
  localStorage.setItem('authState',JSON.stringify(authState));
}

function startWechatLogin(){
  saveLoginTestStatus();
  location.href='phone-bind.html?wechatLogin=1';
}

testAccountStatus.value=readAuthState().accountStatus||'active';

function resetAuthState(){
  localStorage.removeItem('authState');
  testAccountStatus.value='active';
  alert('认证状态已重置，接下来可重新测试未实名/未绑紧急联系人/未学历认证流程。');
}
</script>
</body>
</html>
