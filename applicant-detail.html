*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:88px;color:#1a1a2e}
.status-bar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}

.hero{background:linear-gradient(135deg,#FF6B35,#FF9A6C);padding:22px 16px 30px;color:#fff}

.avatar{width:72px;height:72px;border-radius:24px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;border:2px solid rgba(255,255,255,.42);flex-shrink:0}
.hero-info{flex:1;min-width:0}
.name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}

.name-side{display:flex;align-items:center;gap:8px;margin-left:auto}
.credit{font-size:26px;font-weight:800;white-space:nowrap}
.credit small{display:block;font-size:11px;font-weight:500;opacity:.85;text-align:right}
.hero-desc{font-size:12px;line-height:1.7;opacity:.92;margin-top:8px;word-break:break-word}
.hero-actions{display:none;align-items:center}
.hero-icon-btn{height:32px;min-width:32px;padding:0 9px;border:none;border-radius:16px;background:rgba(255,255,255,.16);color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:4px;font-size:15px;cursor:pointer}
.hero-icon-btn .text{display:none;font-size:11px;font-weight:700;letter-spacing:.2px}
.hero-icon-btn.active{background:rgba(255,255,255,.28)}
.hero-icon-btn.active .text{display:inline}
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;margin:-16px 16px 10px;border-radius:16px;box-shadow:0 10px 24px rgba(17,24,39,.08);position:relative;z-index:2}

.stats .num{font-size:18px;font-weight:800;color:#1a1a2e}
.stats .label{font-size:11px;color:#98a2b3;margin-top:4px}

.main-tab{flex:1;height:40px;border:none;border-radius:20px;background:#fff;color:#667085;font-size:14px;font-weight:700;cursor:pointer}
.main-tab.active{background:#4A6CF7;color:#fff}
.panel{display:none}
.panel.show{display:block}
.card{background:#fff;margin:10px 16px;border-radius:16px;padding:16px}
.card .title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:12px}
.cert-row{display:flex;gap:8px;flex-wrap:wrap}
.cert-row span{padding:6px 10px;border-radius:999px;font-size:12px;background:#fff7e8;color:#c77700}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 10px}
.info-item{background:#f8fafc;border-radius:12px;padding:12px}
.info-item .label{font-size:11px;color:#98a2b3}
.info-item .value{font-size:14px;color:#1a1a2e;font-weight:600;line-height:1.6;margin-top:5px;word-break:break-word}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.media-card{border:1px solid #edf0f5;border-radius:14px;overflow:hidden;background:#fff}
.media-thumb{aspect-ratio:1/1;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden}
.media-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.media-name{padding:8px 10px;font-size:11px;color:#667085;line-height:1.5;word-break:break-word}
.review-tabs{display:flex;gap:8px;margin-bottom:12px}
.review-tab{height:34px;padding:0 14px;border:none;border-radius:17px;background:#f5f7fb;color:#667085;font-size:13px;cursor:pointer}
.review-tab.active{background:#eef2ff;color:#4A6CF7;font-weight:700}
.review-group{display:grid;gap:10px}
.review{border:1px solid #f2f2f2;border-radius:14px;padding:14px}
.review.good{background:#f6ffed;border-color:#d9f7be}
.review.bad{background:#fff7e6;border-color:#ffe7ba}
.review .top{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px;color:#667085}
.review .score{font-weight:700}
.review.good .score{color:#52c41a}
.review.bad .score{color:#fa8c16}
.review .text{font-size:13px;color:#344054;line-height:1.7;margin-top:8px}
.moment-list{display:grid;gap:10px;padding-bottom:8px}
.moment-card{border:1px solid #f1f3f5;border-radius:14px;padding:14px;background:#fff}
.moment-card.link{cursor:pointer}
.moment-top{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px;color:#98a2b3}
.moment-text{font-size:13px;color:#344054;line-height:1.8;margin-top:8px}
.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.image-grid.two{grid-template-columns:repeat(2,1fr)}
.image-grid.one{grid-template-columns:1fr}
.image-tile{aspect-ratio:1/1;border-radius:12px;padding:10px;display:flex;align-items:flex-end;font-size:11px;font-weight:700;color:#1a1a2e}
.video-tile{margin-top:12px;border-radius:14px;background:#111827;color:#fff;padding:14px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}

.order-tag{margin-top:12px;padding:12px;border-radius:12px;background:#f8faff;border:1px solid #edf0f5}

.moment-empty,.review-empty{padding:10px 0 4px;font-size:13px;color:#98a2b3;line-height:1.8;text-align:center}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:375px;background:#fff;padding:10px 16px;border-top:1px solid #eee;display:flex;gap:10px}

.toast{position:fixed;top:92px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(26,26,46,.92);color:#fff;padding:10px 14px;border-radius:14px;font-size:12px;opacity:0;pointer-events:none;transition:.22s ease;z-index:80;max-width:320px;text-align:center;box-shadow:0 12px 28px rgba(0,0,0,.18)}

function buildQuery(obj){
  const query=new URLSearchParams();
  Object.entries(obj).forEach(function(entry){
    const key=entry[0];
    const val=entry[1];
    if(val!==undefined&&val!==null&&val!=='')query.set(key,val);
  });
  return query.toString();
}

function escapeHtml(text){
  return String(text||'').replace(/[&<>"']/g,function(char){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char];
  });
}

function showToast(text,type){
  clearTimeout(toastTimer);
  const toast=document.getElementById('pageToast');
  toast.textContent=text;
  toast.className='toast show'+(type?' '+type:'');
  toastTimer=setTimeout(function(){
    toast.className='toast';
  },2200);
}

function normalizeReviewScore(rawScore,fallbackType){
  const parsed=parseFloat(rawScore);
  let score=Math.round(parsed);
  if(!Number.isFinite(score))score=fallbackType==='bad'?2:5;
  score=Math.max(1,Math.min(5,score));
  if(fallbackType==='bad'&&score>2)score=2;
  if(fallbackType==='good'&&score<3)score=3;
  return score.toFixed(1);
}

function getReviewType(score){
  return parseFloat(score)>=3?'good':'bad';
}

function resolveOrderInfo(order){
  if(!order||!(order.serviceName||order.title))return null;
  const matched=order.id?BanxingMoments.getCompletedOrders().find(function(item){return item.id===order.id;}):null;
  return {
    id:order.id||matched&&matched.id||'',
    serviceName:order.serviceName||matched&&matched.serviceName||order.title||matched&&matched.title||'',
    taskTime:BanxingTimeUtils.formatTaskTime(order.taskTime||order.time||order.finishedAt||matched&&matched.taskTime||matched&&matched.finishedAt)||''
  };
}

function orderTagHtml(order){
  const info=resolveOrderInfo(order);
  if(!info||!info.serviceName)return '';
  return (
    '<div class="order-tag">'+
      '<strong>'+escapeHtml(info.serviceName)+'</strong>'+
      (info.taskTime?'<span>任务时间：'+escapeHtml(info.taskTime)+'</span>':'')+
    '</div>'
  );
}

function renderImages(images){
  if(!images||!images.length)return '';
  const cls=images.length===1?'one':(images.length===2?'two':'');
  return '<div class="image-grid '+cls+'">'+images.map(function(image){
    return '<div class="image-tile" style="background:'+escapeHtml(image.color||'#eef2ff')+'">'+escapeHtml(image.label||'图片')+'</div>';
  }).join('')+'</div>';
}

function renderMediaGrid(images){
  if(!Array.isArray(images)||!images.length)return '';
  return '<div class="media-grid">'+images.map(function(item,index){
    const source=typeof item==='string'?{name:item,dataUrl:''}:item||{};
    const name=source.name||('图片'+(index+1));
    const thumb=source.dataUrl
      ?'<img alt="'+escapeHtml(name)+'" src="'+escapeHtml(source.dataUrl)+'">'
      :'<span>'+escapeHtml(name)+'</span>';
    return '<div class="media-card"><div class="media-thumb">'+thumb+'</div><div class="media-name">'+escapeHtml(name)+'</div></div>';
  }).join('')+'</div>';
}

function renderVideo(video){
  if(!video)return '';
  return '<div class="video-tile">🎬 '+escapeHtml(video.label||'视频')+'<span>视频</span></div>';
}

function getCurrentUserPageHref(){

function getMomentDetailHref(momentId){
  return 'moment-detail.html?'+buildQuery({

function getCurrentPageHref(extra){
  const query=new URLSearchParams(window.location.search);
  Object.entries(extra||{}).forEach(function(entry){
    const key=entry[0];
    const val=entry[1];
    if(val!==undefined&&val!==null&&val!=='')query.set(key,val);
    else query.delete(key);
  });
  return 'applicant-detail.html?'+query.toString();
}

function getMomentPreviewHref(item,profile){

    preview:JSON.stringify({
      authorId:profile.id||'',

      text:item.text||'',
      images:item.images||[],
      order:item.order||null

    backHref:getCurrentPageHref({tab:'moments'})
  });
}

    applicants,

function applicantsHref(extra){

    owner:'published',

    type,
    id:orderId,
    provider,
    applicants,
    returnRole,
    returnStatus,
    title:orderTitle,
    time:orderTime,
    price:orderPrice,
    ...extra
  });
}

function readListValue(value,max){
  const limit=typeof max==='number'?max:Infinity;
  const list=Array.isArray(value)?value:String(value||'').split(/[｜|/、,，]+/);
  return list
    .map(function(item){return String(item||'').trim();})
    .filter(Boolean)
    .filter(function(item,index,source){return source.indexOf(item)===index;})
    .slice(0,limit);
}

function joinInfoList(value,fallback){
  const list=readListValue(value);
  return list.length?list.join('｜'):(fallback||'待补充');
}

function getInfoValue(infoRows,label){
  const matched=(Array.isArray(infoRows)?infoRows:[]).find(function(item){
    return Array.isArray(item)&&item[0]===label;
  });
  return matched&&matched[1]?matched[1]:'';
}

function inferAcademicYear(eduProfile){
  const explicit=eduProfile&&(eduProfile.grade||eduProfile.year||eduProfile.academicYear);
  if(explicit)return String(explicit).trim();
  const level=String(eduProfile&&eduProfile.level||'').trim();
  if(level.indexOf('博')>-1)return '博一';
  if(level.indexOf('硕')>-1||level.indexOf('研')>-1)return '研一';
  if(level.indexOf('本科')>-1)return '大二';
  return '';
}

function buildInfoRows(config){
  const rows=[
    ['学校',config.school||'待补充'],
    ['学年',config.academicYear||'待补充'],
    ['常驻城市',config.city||'待补充'],
    ['服务方向',joinInfoList(config.serviceDirection,'待补充')],
    ['可接时段',joinInfoList(config.availableTime,'待补充')],
    ['个人标签',joinInfoList(config.personalTags,'待补充')]
  ];
  if(config.height||config.weight){
    rows.push(['身高 / 体重',[config.height,config.weight].filter(Boolean).join(' / ')||'待补充']);
  }
  return rows;
}

function getReviewRows(profile){
  const good=(profile.goodReviews||[]).map(function(item){
    const score=normalizeReviewScore(item[1],'good');
    return {type:getReviewType(score),name:item[0],score:score,text:item[2]};
  });
  const bad=(profile.badReviews||[]).map(function(item){
    const score=normalizeReviewScore(item[1],'bad');
    return {type:getReviewType(score),name:item[0],score:score,text:item[2]};
  });
  if(activeReviewFilter==='good')return good;
  if(activeReviewFilter==='bad')return bad;
  return good.concat(bad);
}

function renderReviews(profile){
  document.querySelectorAll('[data-review-filter]').forEach(function(node){
    node.classList.toggle('active',node.dataset.reviewFilter===activeReviewFilter);
  });
  const rows=getReviewRows(profile);
  document.getElementById('reviewList').innerHTML=rows.length?rows.map(function(item){
    return (
      '<div class="review '+item.type+'">'+
        '<div class="top"><span>'+escapeHtml(item.name)+'</span><span class="score">'+escapeHtml(item.type==='good'?'好评 ':'差评 ')+escapeHtml(item.score)+'分</span></div>'+
        '<div class="text">'+escapeHtml(item.text)+'</div>'+
      '</div>'
    );
  }).join(''):'<div class="review-empty">当前筛选下还没有评价内容</div>';
}

function renderMoments(){
  const list=getMomentPosts();
  document.getElementById('momentList').innerHTML=list.length?list.map(function(item){
    return (
      '<div class="moment-card '+(item.href?'link':'')+'"'+(item.href?' data-href="'+escapeHtml(item.href)+'"':'')+'>'+
        '<div class="moment-top"><span>'+escapeHtml(item.time||'刚刚')+'</span></div>'+
        '<div class="moment-text">'+escapeHtml(item.text||'')+'</div>'+
        renderImages(item.images)+
        renderVideo(item.video)+
        orderTagHtml(item.order)+
      '</div>'
    );
  }).join(''):'<div class="moment-empty">暂时还没有可展示的动态内容</div>';
}

function renderTabs(){
  document.querySelectorAll('[data-tab]').forEach(function(node){
    node.classList.toggle('active',node.dataset.tab===activeTab);
  });
  document.getElementById('profilePanel').classList.toggle('show',activeTab==='profile');
  document.getElementById('momentsPanel').classList.toggle('show',activeTab==='moments');
}

function resolveBackHref(){
  if(mode==='user')return params.get('backHref')||'moments.html';
  return owner==='accepted'
    ? acceptedDetailHref()
    : (source==='applicants'?applicantsHref():publishedDetailHref());
}

function bindBottomActions(profile){
  const bar=document.getElementById('actionBar');
  if(mode==='user'){
    bar.style.display='none';
    document.body.style.paddingBottom='24px';
    return;
  }
  const backHref=resolveBackHref();
  document.getElementById('backButton').onclick=function(){
    location.href=backHref;
  };
  const canChoose=owner==='published'&&source==='applicants'&&!provider;
  const primaryButton=document.getElementById('primaryButton');
  if(canChoose){
    primaryButton.textContent='选中该服务者';
    primaryButton.onclick=function(){
      location.href=publishedDetailHref({status:'ready',provider:profile.id||applicantId});
    };
  }else{
    primaryButton.textContent='返回订单详情';
    primaryButton.onclick=function(){
      location.href=(owner==='accepted'?acceptedDetailHref():publishedDetailHref());
    };
  }
}

function renderAll(){
  const profile=getActiveProfile();
  profile.id=mode==='user'?(userId||'me'):(applicantId||'wang');
  renderTop(profile);
  renderProfileInfo(profile);
  renderReviews(profile);
  renderMoments();
  renderTabs();
  bindBottomActions(profile);
  document.getElementById('backLink').href=resolveBackHref();
}

document.querySelector('.main-tabs').addEventListener('click',function(event){
  const button=event.target.closest('[data-tab]');
  if(!button)return;
  activeTab=button.dataset.tab||'profile';
  renderTabs();
});

document.querySelector('.review-tabs').addEventListener('click',function(event){
  const button=event.target.closest('[data-review-filter]');
  if(!button)return;
  activeReviewFilter=button.dataset.reviewFilter||'all';
  renderReviews(getActiveProfile());
});

document.getElementById('momentList').addEventListener('click',function(event){
  const card=event.target.closest('[data-href]');
  if(!card)return;
  location.href=card.dataset.href;
});

document.getElementById('heroActions').addEventListener('click',function(event){
  const button=event.target.closest('[data-block-user]');
  if(!button)return;
  const result=BanxingMoments.toggleBlock(button.dataset.blockUser);
  renderAll();
  showToast(result.blocked?'已拉黑，对方动态和任务将不再展示':'已取消拉黑','success');
});

renderAll();
</script>
</body>
</html>
