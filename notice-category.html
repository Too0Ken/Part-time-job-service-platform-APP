<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>通知详情 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:24px}
.status-bar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.nav{height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #eee}
.nav .back{font-size:20px;color:#333;text-decoration:none;margin-right:12px}
.nav .title{font-size:16px;font-weight:600;color:#1a1a2e;flex:1;text-align:center}
.nav .placeholder{width:24px}
.list{padding:16px}
.item{background:#fff;border-radius:16px;padding:14px 14px 12px;margin-bottom:10px}
.item .top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.item .title{font-size:14px;font-weight:700;color:#1a1a2e}
.item .time{font-size:11px;color:#999}
.item .desc{font-size:13px;color:#5f6675;line-height:1.7;margin-top:8px}
.item .tag{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;margin-top:10px}
.order-box{margin-top:12px;padding:12px;border-radius:12px;background:#f8faff}
.order-box .label{font-size:11px;color:#98a2b3}
.order-box .name{font-size:13px;font-weight:700;color:#1a1a2e;margin-top:6px}
.order-box .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.order-box .meta span{display:inline-flex;padding:4px 9px;border-radius:999px;background:#fff;color:#667085;font-size:11px}
.item-actions{display:flex;gap:10px;margin-top:12px}
.item-actions a{flex:1;height:38px;border-radius:19px;text-decoration:none;font-size:13px;display:flex;align-items:center;justify-content:center}
.item-actions .ghost{background:#fff;border:1px solid #d9deeb;color:#667085}
.item-actions .primary{background:linear-gradient(135deg,#4A6CF7,#6C5CF7);color:#fff}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="nav">
  <a href="messages.html" class="back">←</a>
  <span class="title">通知详情</span>
  <span class="placeholder"></span>
</div>

<div class="list" id="list"></div>

<script src="time-utils.js"></script>
<script src="moments-data.js"></script>
<script>
const params=new URLSearchParams(location.search);
const category=params.get('category')||'order';

function buildQuery(obj){
  const query=new URLSearchParams();
  Object.entries(obj).forEach(function(entry){
    const key=entry[0];
    const val=entry[1];
    if(val!==undefined&&val!==null&&val!=='')query.set(key,val);
  });
  return query.toString();
}

function buildOrderLink(order){
  return 'order-detail.html?'+buildQuery(order.detailParams||{});
}

function buildAppealLink(order,appealTitle){
  return 'credit-appeal.html?'+buildQuery({
    orderId:order.id,
    orderTitle:order.title,
    orderStatus:order.status,
    orderTime:BanxingTimeUtils.formatTaskTime(order.time)||order.time,
    orderAmount:order.amount,
    orderLocation:order.location,
    detailLink:buildOrderLink(order),
    backLink:'notice-category.html?'+buildQuery({category:category}),
    appealTitle:appealTitle||'订单相关信用分申诉'
  });
}

function renderItemActions(item){
  const actions=[];
  if(item.order){
    actions.push('<a class="ghost" href="'+buildOrderLink(item.order)+'">查看订单</a>');
    if(item.canAppeal){
      actions.push('<a class="primary" href="'+buildAppealLink(item.order,item.appealTitle)+'">信用分申诉</a>');
    }
  }
  if(Array.isArray(item.actions)){
    item.actions.forEach(function(action){
      actions.push('<a class="'+(action.primary?'primary':'ghost')+'" href="'+action.href+'">'+action.label+'</a>');
    });
  }
  return actions.length?'<div class="item-actions">'+actions.join('')+'</div>':'';
}

    ]
  },
  credit:{

    title:'信用积分扣分通知',
    unread:1,
    color:'#F0FFF4',
    textColor:'#52C41A',
    tagBg:'#F0FFF4',
    tagColor:'#52C41A',
    items:[
      {title:'迟到扣分已生效',time:'今天 09:10',desc:'由于本次订单迟到 15 分钟，你的信用积分已扣减 3 分。正常完成订单的加分不在前台逐条展示。',tag:'信用积分 -3',canAppeal:true,appealTitle:'迟到扣分申诉',order:{id:'P8',title:'上门喂猫｜1.5 小时｜海淀区',status:'服务中',time:'今天 14:00-15:30',amount:'¥120',location:'中关村南大街XX小区',detailParams:{owner:'published',status:'serving',type:'cat',id:'p8',provider:'wang',returnRole:'all',returnStatus:'all'}}},

      {title:'举报处理结果通知',time:'昨天 17:10',desc:'你提交的举报已进入审核队列；若后续核实为恶意举报，将按规则处理举报者信用分。',tag:'举报处理中',actions:[{label:'查看动态',href:'moments.html',primary:true}]}
    ]
  }
};

let current=categoryMeta[category]||categoryMeta.order;
if(category==='moments'&&window.BanxingMoments){
  current={
    ...current,
    unread:BanxingMoments.getMomentNotifications().length,
    items:BanxingMoments.getMomentNotifications()
  };
}

document.getElementById('list').innerHTML=current.items.map(item=>`
  <div class="item">
    <div class="top">
      <div class="title">${item.title}</div>
      <div class="time">${BanxingTimeUtils.formatMaybe(item.time)}</div>
    </div>
    <div class="desc">${item.desc}</div>
    <div class="tag" style="background:${current.tagBg};color:${current.tagColor}">${item.tag}</div>
    ${item.order?`
      <div class="order-box">
        <div class="label">关联订单</div>
        <div class="name">${item.order.title}</div>
        <div class="meta">
          <span>订单号 ${item.order.id}</span>
          <span>${item.order.status}</span>
          <span>${BanxingTimeUtils.formatTaskTime(item.order.time)||item.order.time}</span>
          <span>${item.order.amount}</span>
        </div>
      </div>
    `:''}
    ${renderItemActions(item)}
  </div>
`).join('');
</script>
</body>
</html>
