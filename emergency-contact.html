<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>紧急联系人 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh}
.status-bar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.nav{height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
.nav .back{font-size:20px;color:#333;text-decoration:none;margin-right:12px}
.nav .title{font-size:16px;font-weight:600;color:#1a1a2e;flex:1;text-align:center}
.nav .placeholder{width:32px}
.card{background:#fff;margin:16px;border-radius:12px;padding:24px}
.card-title{font-size:18px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
.card-desc{font-size:13px;color:#999;margin-bottom:24px;line-height:1.6}
.field{margin-bottom:18px}
.field label{display:block;font-size:14px;color:#666;margin-bottom:6px}
.field label .req{color:#FF4D4F;margin-left:2px}
.field input{width:100%;height:44px;border:1px solid #e8e8e8;border-radius:8px;padding:0 12px;font-size:15px;outline:none}
.warning{background:#FFF1F0;border-radius:8px;padding:12px;margin:16px;font-size:12px;color:#FF4D4F;line-height:1.6}
.submit-btn{display:block;width:calc(100% - 32px);margin:24px auto 0;height:48px;background:linear-gradient(135deg,#4A6CF7,#6C5CF7);color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:500;cursor:pointer}
.submit-btn:active{opacity:.85}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="nav">
  <a href="auth-center.html" class="back">←</a>
  <span class="title">紧急联系人</span>
  <span class="placeholder"></span>
</div>
<div class="card">
  <div class="field"><label>联系人姓名 <span class="req">*</span></label><input placeholder="请输入姓名"></div>
  <div class="field"><label>联系人手机号 <span class="req">*</span></label><input type="tel" placeholder="请输入11位手机号" maxlength="11"></div>
  <div class="field"><label>与您的关系（选填）</label><input placeholder="如：父母/朋友/室友"></div>
</div>
<div class="warning">
  ⚠️ 绑定后系统将向联系人发送告知短信。后续SOS紧急事件时将自动通知该联系人。
</div>
<button class="submit-btn" onclick="submitEmergency()">确认绑定</button>
<script>
const emergencyParams=new URLSearchParams(location.search);
const emergencySource=emergencyParams.get('source')||'auth';
if(emergencySource==='apply'){
  document.getElementById('emergencyDesc').textContent='实名认证完成后，接单引导流程中必须补充紧急联系人，此步骤不可跳过。';
}
function submitEmergency(){
  const authState=JSON.parse(localStorage.getItem('authState')||'{}');
  authState.emergencyContactBound=true;
  localStorage.setItem('authState',JSON.stringify(authState));
  if(emergencySource==='apply'){
    location.href='safety-notice.html?type='+(emergencyParams.get('type')||'cat');
    return;
  }
  location.href='auth-center.html';
}
</script>
</body>
</html>
