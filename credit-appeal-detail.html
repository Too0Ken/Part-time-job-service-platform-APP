<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>申诉详情 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:24px}
.status-bar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.nav{height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #eee}
.nav .back{font-size:20px;color:#333;text-decoration:none;margin-right:12px}
.nav .title{font-size:16px;font-weight:600;color:#1a1a2e;flex:1;text-align:center}
.nav .placeholder{width:24px}
.card{background:#fff;margin:16px;border-radius:16px;padding:16px}
.title{font-size:16px;font-weight:700;color:#1a1a2e}
.sub{font-size:12px;color:#98a2b3;margin-top:6px}
.status{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:600;margin-top:12px}
.status.pending{background:#FFF7E6;color:#D48806}
.status.processing{background:#EEF2FF;color:#4A6CF7}
.status.done{background:#F0FFF4;color:#52C41A}
.status.reject{background:#FFF1F0;color:#FF4D4F}
.section{margin-top:14px}
.label{font-size:12px;color:#98a2b3;margin-bottom:8px}
.content{font-size:14px;color:#1a1a2e;line-height:1.8}
.meta-list{display:grid;gap:10px}
.meta-item{padding:12px;border-radius:14px;background:#f8faff}
.meta-item strong{display:block;font-size:13px;color:#667085}
.meta-item span{display:block;font-size:14px;color:#1a1a2e;line-height:1.7;margin-top:5px}
.attach-list{display:flex;gap:8px;flex-wrap:wrap}
.attach-list span{min-width:72px;height:72px;padding:8px;border-radius:12px;background:#EEF2FF;color:#4A6CF7;font-size:11px;display:flex;align-items:center;justify-content:center;text-align:center}
.order-card{padding:14px;border-radius:14px;background:#F8FAFF;border:1px solid #DDE6FF}
.order-card .name{font-size:14px;font-weight:700;color:#1a1a2e}
.order-card .id{font-size:11px;color:#98a2b3;margin-top:4px}
.order-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;margin-top:12px}
.order-grid .item{font-size:11px;color:#98a2b3}
.order-grid .item strong{display:block;font-size:13px;color:#1a1a2e;margin-top:4px}
.order-grid .item.full{grid-column:1/-1}
.order-link{display:inline-flex;align-items:center;justify-content:center;height:36px;padding:0 14px;border-radius:18px;background:#fff;color:#4A6CF7;text-decoration:none;font-size:12px;font-weight:600;border:1px solid #DDE6FF;margin-top:12px}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="nav"><a href="credit-appeal-history.html" class="back">←</a><span class="title">申诉详情</span><span class="placeholder"></span></div>

<div class="card" id="detailCard"></div>

<script src="prototype-data.js"></script>
<script src="location-utils.js"></script>
<script src="time-utils.js"></script>
<script>
const CREDIT_APPEAL_STORAGE_KEY='banxing.creditAppeals';
const params=new URLSearchParams(location.search);
const targetId=params.get('id')||'';

function escapeHtml(text){
  return String(text||'').replace(/[&<>"']/g,function(char){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char];
  });
}

const ORDER_OVERRIDES={
  P8:{title:'上门喂猫｜1.5 小时｜海淀区',location:'北京市 海淀区 中关村南大街XX小区'},
  P4:{title:'婚庆协助｜全天｜海淀区',location:'北京市 海淀区 海淀逸林酒店'},
  A5:{title:'上门喂猫｜1 小时｜朝阳区',location:'北京市 朝阳区 朝阳公寓 3 号楼'},
  A3:{title:'健康陪诊｜3 小时｜海淀区',location:'北京市 海淀区 北医三院'}
};

function getMaskedLocationText(text){
  const source=String(text||'').trim();
  if(!source||source==='待确认'||source==='待补充')return source||'待确认';
  const display=BanxingLocationUtils.getOrderLocationDisplay(source,{exactVisible:false,maskStyle:'asterisk',includeDistance:false});
  if(display.regionText)return display.regionText+' ******';
  return display.text||source.replace(/\s*·\s*距你约[^·]+$/,'');
}

function normalizeOrder(item){
  if(!item||!item.id)return null;
  const id=String(item.id).toUpperCase();
  const override=ORDER_OVERRIDES[id]||{};
  if(!item.title&&!override.title)return null;
  return {
    id:id,
    title:override.title||item.title||'订单',
    status:item.status||'待处理',
    time:BanxingTimeUtils.formatTaskTime(item.time)||item.time||'待补充',
    amount:item.amount||'待补充',
    location:getMaskedLocationText(override.location||item.location||'待补充'),
    detailLink:item.detailLink||''
  };
}

function normalizeRecord(item,index){
  return {
    id:(item&&item.id)||('appeal-'+index),
    title:(item&&item.title)||'信用分申诉',
    content:(item&&item.content)||'',
    time:BanxingTimeUtils.formatMaybe(item&&item.time)||'刚刚',
    status:(item&&item.status)||'processing',
    statusText:(item&&item.statusText)||'审核中',
    progressText:(item&&item.progressText)||'材料已提交，预计 3 个工作日内完成审核。',
    attachments:Array.isArray(item&&item.attachments)?item.attachments:[],
    relatedOrder:normalizeOrder(item&&item.relatedOrder)
  };
}

function readAppeals(){
  try{
    const list=JSON.parse(localStorage.getItem(CREDIT_APPEAL_STORAGE_KEY)||'[]');
    return Array.isArray(list)?list.map(normalizeRecord):[];
  }catch(error){
    return [];
  }
}

function saveAppeals(list){
  localStorage.setItem(CREDIT_APPEAL_STORAGE_KEY,JSON.stringify(list));
}

function seedAppeals(){
  const existing=readAppeals();
  if(existing.length)return existing;
  const seeds=[
    {
      id:'appeal-1001',
      title:'迟到扣分申诉',
      content:'你提交了聊天记录截图和到场定位截图，说明本次迟到是因小区门禁临时管控导致，申请平台复核扣分结果。',
      time:'4月2日 11:20',
      status:'processing',
      statusText:'审核中',
      progressText:'当前进度：材料已提交，预计 3 个工作日内完成审核。',
      attachments:['图片 1','图片 2'],
      relatedOrder:{id:'P8',title:'上门喂猫｜1.5 小时｜海淀区',status:'服务中',time:'今天 14:00-15:30',amount:'¥120',location:'中关村南大街XX小区',detailLink:'order-detail.html?owner=published&status=serving&type=cat&id=p8&provider=wang&returnRole=all&returnStatus=all'}
    },
    {
      id:'appeal-1002',
      title:'纠纷责任扣分申诉',
      content:'平台复核后认定你提供的现场照片和聊天记录有效，原先的 -5 分已恢复，本次申诉结论已同步到信用分明细。',
      time:'3月25日 18:06',
      status:'done',
      statusText:'申诉成功',
      progressText:'处理结果：3月27日 10:30 已完成复核并恢复信用分。',
      attachments:['图片 1','图片 2','图片 3'],
      relatedOrder:{id:'P4',title:'婚庆协助｜全天｜海淀区',status:'已退款',time:'4月14日 07:30',amount:'¥500',location:'海淀逸林酒店',detailLink:'order-detail.html?owner=published&status=refund&type=wedding&id=p4&provider=chen&disputeHistory=1&returnRole=all&returnStatus=all'}
    },
    {
      id:'appeal-1003',
      title:'无故取消订单扣分申诉',
      content:'平台核验订单确认时间、聊天记录和取消原因后，认为本次扣分符合规则，申诉未通过。',
      time:'3月11日 09:42',
      status:'reject',
      statusText:'申诉未通过',
      progressText:'处理结果：3月12日 16:20 已驳回，本次信用分保持原结果。',
      attachments:['图片 1'],
      relatedOrder:{id:'A5',title:'上门喂猫｜1 小时｜朝阳区',status:'纠纷中',time:'4月12日 19:00',amount:'¥160',location:'朝阳公寓 3 号楼',detailLink:'fuwuzhe_order-detail.html?owner=accepted&status=dispute&type=cat&id=a5&returnRole=all&returnStatus=all'}
    }
  ];
  saveAppeals(seeds);
  return seeds.map(normalizeRecord);
}

const records=seedAppeals();
const current=records.find(function(item){return item.id===targetId;})||normalizeRecord({
  id:'not-found',
  title:'申诉不存在',
  content:'当前申诉记录不存在，可能已被清空。',
  time:'-',
  status:'pending',
  statusText:'未找到',
  progressText:'请返回申诉记录页重新选择。',
  attachments:[]
},0);

document.getElementById('detailCard').innerHTML=
  '<div class="title">'+escapeHtml(current.title)+'</div>'+
  '<div class="sub">'+escapeHtml(current.time)+'</div>'+
  '<div class="status '+escapeHtml(current.status)+'">'+escapeHtml(current.statusText)+'</div>'+
  (current.relatedOrder
    ? '<div class="section"><div class="label">关联订单</div><div class="order-card"><div class="name">'+escapeHtml(current.relatedOrder.title)+'</div><div class="id">订单号 '+escapeHtml(current.relatedOrder.id)+'</div><div class="order-grid"><div class="item">订单状态<strong>'+escapeHtml(current.relatedOrder.status)+'</strong></div><div class="item">订单金额<strong>'+escapeHtml(current.relatedOrder.amount)+'</strong></div><div class="item">服务时间<strong>'+escapeHtml(current.relatedOrder.time)+'</strong></div><div class="item full">服务地点<strong>'+escapeHtml(current.relatedOrder.location)+'</strong></div></div>'+(current.relatedOrder.detailLink?'<a class="order-link" href="'+escapeHtml(current.relatedOrder.detailLink)+'">查看订单详情</a>':'')+'</div></div>'
    : ''
  )+
  '<div class="section"><div class="label">申诉说明</div><div class="content">'+escapeHtml(current.content)+'</div></div>'+
  '<div class="section"><div class="label">处理进度</div><div class="content">'+escapeHtml(current.progressText)+'</div></div>'+
  '<div class="section"><div class="label">补充信息</div><div class="meta-list">'+
    '<div class="meta-item"><strong>申诉编号</strong><span>'+escapeHtml(current.id)+'</span></div>'+
    '<div class="meta-item"><strong>状态说明</strong><span>'+escapeHtml(current.statusText)+'</span></div>'+
  '</div></div>'+
  '<div class="section"><div class="label">附件材料</div><div class="attach-list">'+
    (current.attachments.length?current.attachments.map(function(item){return '<span>'+escapeHtml(item)+'</span>';}).join(''):'<span>无附件</span>')+
  '</div></div>';
</script>
</body>
</html>
