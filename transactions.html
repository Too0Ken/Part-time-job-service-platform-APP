<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>交易明细 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh}
.status-bar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.nav{height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #eee}
.nav .back{font-size:20px;color:#333;text-decoration:none;margin-right:12px}
.nav .title{font-size:16px;font-weight:600;color:#1a1a2e;flex:1;text-align:center}
.tabs{display:flex;background:#fff;margin-top:0;padding:0 16px}
.tabs .t{flex:1;text-align:center;padding:14px 0;font-size:14px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tabs .t.active{color:#4A6CF7;border-color:#4A6CF7;font-weight:600}
.date-group{padding:8px 16px;font-size:12px;color:#999;background:#f5f6fa;font-weight:600}
.list{background:#fff}
.list .item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f5f5f5}
.list .item .icon{width:36px;height:36px;min-width:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;margin-right:12px}
.list .item .icon.income{background:#F0FFF4;color:#52C41A}
.list .item .icon.expense{background:#FFF1F0;color:#FF4D4F}
.list .item .icon.withdraw{background:#EEF2FF;color:#4A6CF7}
.list .item .info{flex:1}
.list .item .info .title{font-size:14px;color:#1a1a2e}
.list .item .info .time{font-size:11px;color:#999;margin-top:2px}
.list .item .amount{font-size:15px;font-weight:600}
.list .item .amount.pos{color:#52C41A}
.list .item .amount.neg{color:#FF4D4F}
.list .item .amount.zero{color:#999}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="nav">
  <a href="wallet.html" class="back">←</a>
  <span class="title">交易明细</span>
</div>
<div class="tabs"><span class="t active">全部</span><span class="t">收入</span><span class="t">提现</span></div>
<div class="date-group">2026年3月</div>
<div class="list">
  <div class="item"><div class="icon income">💰</div><div class="info"><div class="title">喂猫服务结算 - 张小花</div><div class="time">3月26日 15:35</div></div><div class="amount pos">+¥114.00</div></div>
  <div class="item"><div class="icon income">💰</div><div class="info"><div class="title">陪跑服务结算 - 李明</div><div class="time">3月20日 18:20</div></div><div class="amount pos">+¥76.00</div></div>
  <div class="item"><div class="icon withdraw">↗</div><div class="info"><div class="title">提现到微信零钱</div><div class="time">3月19日 10:00</div></div><div class="amount neg">-¥200.00</div></div>
  <div class="item"><div class="icon income">💰</div><div class="info"><div class="title">陪诊服务结算 - 王阿姨</div><div class="time">3月18日 12:40</div></div><div class="amount pos">+¥138.00</div></div>
  <div class="item"><div class="icon income">💰</div><div class="info"><div class="title">喂猫服务结算 - 刘同学</div><div class="time">3月15日 16:10</div></div><div class="amount pos">+¥85.50</div></div>
  <div class="item"><div class="icon withdraw">↗</div><div class="info"><div class="title">提现到微信零钱</div><div class="time">3月14日 11:00</div></div><div class="amount neg">-¥150.00</div></div>
</div>
<div class="date-group">2026年2月</div>
<div class="list">
  <div class="item"><div class="icon income">💰</div><div class="info"><div class="title">喂猫服务结算 - 陈学长</div><div class="time">2月28日 14:20</div></div><div class="amount pos">+¥95.00</div></div>
</div>
</body>
</html>
