<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>安全须知 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#FFFBE6;max-width:375px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.status-bar{height:44px;background:#FAAD14;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.progress{display:flex;padding:12px 24px;gap:0;background:#FAAD14}
.progress .step{flex:1;text-align:center;font-size:11px;color:#fff;position:relative;opacity:.7}
.progress .step::before{content:'';display:block;width:100%;height:3px;background:rgba(255,255,255,.3);border-radius:2px;margin-bottom:6px}
.progress .step.done::before{background:#52C41A}
.progress .step.active::before{background:#fff}
.progress .step .num{display:inline-block;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.3);font-size:11px;line-height:20px}
.progress .step.done .num{background:#52C41A}
.progress .step.active .num{background:#fff}
.header{background:#FAAD14;padding:24px 20px;text-align:center;color:#fff}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.header p{font-size:13px;opacity:.9}
.content{flex:1;padding:20px;overflow-y:auto}
.notice-item{display:flex;gap:12px;margin-bottom:16px}
.notice-item .icon{width:36px;height:36px;min-width:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.notice-item .text h4{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:2px}
.notice-item .text p{font-size:12px;color:#666;line-height:1.6}
.load-tip{margin:0 20px 12px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.35);font-size:12px;line-height:1.6;color:#7a5a00}
.footer{padding:20px;background:#FFFBE6}
.confirm-btn{display:block;width:100%;height:48px;background:#FAAD14;color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:600;cursor:pointer}
.confirm-btn:active{opacity:.85}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="progress">
  <div class="step done"><span class="num">✓</span>类型</div>
  <div class="step active"><span class="num">2</span>确认</div>
  <div class="step"><span class="num">3</span>子项</div>
  <div class="step"><span class="num">4</span>时间</div>
  <div class="step"><span class="num">5</span>地址</div>
  <div class="step"><span class="num">6</span>酬劳</div>
</div>
<div class="header">
  <h1>⚠️ 安全须知</h1>
  <p id="subTitle">上门服务类任务安全注意事项</p>
</div>
<div class="load-tip" id="loadTip" style="display:none"></div>
<div class="content" id="noticeList"></div>
<div class="footer">
  <button class="confirm-btn" onclick="goNext()">我已知晓，继续发布</button>
</div>
<script>
const params=new URLSearchParams(window.location.search);
const type=params.get('type')||'waimao';
const DEFAULT_NOTICE_CONFIG={
  version:'2026-03-31',
  waimao:{
    subtitle:'上门服务类任务安全注意事项',
    items:[
      {icon:'🔒',title:'勿透露门禁密码',desc:'请勿在备注或公开说明中透露门禁密码、门锁口令、WiFi 密码等敏感信息，相关信息仅在必要时通过安全方式传递。'},
      {icon:'👤',title:'建议安排人在场',desc:'若条件允许，建议服务期间家中有人在场或可随时联络，降低上门服务的安全风险。'},
      {icon:'🛡️',title:'保险建议',desc:'上门服务涉及入户与财物场景，建议购买平台保险，以便在出现财物损失或纠纷时提供风险兜底。'},
      {icon:'🆘',title:'SOS 功能说明',desc:'服务过程中如遇异常情况，可使用平台 SOS 功能快速求助，平台将优先介入处理。'}
    ]
  },
  paopao:{
    subtitle:'户外运动类任务安全注意事项',
    items:[
      {icon:'⚠️',title:'风险告知',desc:'户外陪跑、爬山等活动存在体力透支、摔伤、天气变化等风险，请结合自身情况合理设置路线和强度。'},
      {icon:'🛡️',title:'强制保险说明',desc:'户外运动类任务发布前需完成保险投保，保险费率将根据任务难度动态计算，无法跳过。'},
      {icon:'📍',title:'GPS 记录说明',desc:'任务进行中系统会记录轨迹与关键定位，用于安全保障、异常排查和后续争议取证。'},
      {icon:'📷',title:'阶段打卡说明',desc:'服务过程中将根据阶段提醒服务者完成打卡，包含集合、途中和结束节点，用于留痕保障双方权益。'},
      {icon:'🆘',title:'SOS 功能说明',desc:'如遇迷路、受伤、突发天气等紧急情况，可使用 SOS 功能快速求助，平台将优先响应。'}
    ]
  }
};

function loadNoticeConfig(){
  let source='default';
  let config=DEFAULT_NOTICE_CONFIG;
  let fallbackMessage='';
  try{
    const remoteRaw=localStorage.getItem('safetyNoticeRemoteConfig');
    if(remoteRaw){
      const remote=JSON.parse(remoteRaw);
      if(remote&&remote.waimao&&remote.paopao){
        config=remote;
        source='remote';
        localStorage.setItem('safetyNoticeCachedConfig',JSON.stringify(remote));
        return {config,source,fallbackMessage};
      }
      fallbackMessage='安全须知内容加载异常，已展示默认文本内容，你仍可继续发布。';
    }
  }catch(error){}
  try{
    const cached=JSON.parse(localStorage.getItem('safetyNoticeCachedConfig')||'null');
    if(cached&&cached.waimao&&cached.paopao){
      config=cached;
      source='cached';
      fallbackMessage='安全须知内容加载异常，已展示本地缓存内容，你仍可继续发布。';
      return {config,source,fallbackMessage};
    }
  }catch(error){}
  localStorage.setItem('safetyNoticeCachedConfig',JSON.stringify(DEFAULT_NOTICE_CONFIG));
  return {config,source,fallbackMessage};
}

const {config:noticeConfig,source,fallbackMessage}=loadNoticeConfig();
const currentConfig=(noticeConfig[type]&&noticeConfig[type].items)?noticeConfig:DEFAULT_NOTICE_CONFIG;
const notice=currentConfig[type]||DEFAULT_NOTICE_CONFIG.waimao;
document.getElementById('subTitle').textContent=notice.subtitle;
document.getElementById('noticeList').innerHTML=notice.items.map(item=>`<div class="notice-item"><div class="icon">${item.icon}</div><div class="text"><h4>${item.title}</h4><p>${item.desc}</p></div></div>`).join('');
if(fallbackMessage){
  const loadTip=document.getElementById('loadTip');
  loadTip.style.display='block';
  loadTip.textContent=fallbackMessage;
}

function goNext(){
  const draft=JSON.parse(localStorage.getItem('publishDraft')||'{}');
  const confirmation={
    type,
    confirmedAt:new Date().toISOString(),
    version:currentConfig.version||DEFAULT_NOTICE_CONFIG.version,
    source,
    subtitle:notice.subtitle
  };
  draft.type=type;
  draft.safetyNoticeConfirmation=confirmation;
  localStorage.setItem('publishDraft',JSON.stringify(draft));
  sessionStorage.setItem('publishSafetyConfirmed:'+type,JSON.stringify(confirmation));
  location.href='publish-items.html?type='+type;
}
</script>
</body>
</html>
