<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>确认订单 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:88px;color:#1a1a2e}
.status-bar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.nav{height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:20}
.nav .back{font-size:20px;color:#333;text-decoration:none;margin-right:12px}
.nav .title{font-size:16px;font-weight:600;color:#1a1a2e;flex:1;text-align:center}
.nav .placeholder{width:32px}
.progress{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px 16px;background:#fff;border-bottom:1px solid #f1f3f5}
.progress .step{position:relative;padding-top:10px;text-align:center;font-size:10px;color:#98a2b3}
.progress .step::before{content:'';position:absolute;top:0;left:12px;right:12px;height:4px;border-radius:999px;background:#e5e7eb}
.progress .step.active::before{background:#FF6B35}
.progress .step.done::before{background:#16a34a}
.progress .num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#e5e7eb;color:#667085;font-size:10px;font-weight:700;margin-bottom:4px}
.progress .active .num{background:#FF6B35;color:#fff}
.progress .done .num{background:#16a34a;color:#fff}
.pill{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:999px;background:#fff;color:#667085;font-size:11px}
.pill.price{background:#FFF1EC;color:#FF6B35;font-weight:700}
.pill.high{background:#FFF1F0;color:#FF4D4F}
.card{background:#fff;margin:0 12px 8px;border-radius:16px;padding:11px 12px}
.progress + .card{margin-top:10px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.card-title{font-size:13px;font-weight:800;color:#1a1a2e}
.card-link{font-size:12px;color:#FF6B35;text-decoration:none}
.summary-row{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-bottom:1px solid #f5f6fa;font-size:12px;color:#4B5563;font-weight:400}
.summary-row:last-child{border-bottom:none}
.summary-row .value{color:#1a1a2e;text-align:right;font-weight:400;line-height:1.45}
.summary-row .value.multiline{white-space:pre-wrap}
.fee-row{display:flex;justify-content:space-between;gap:12px;padding:4px 0;font-size:12px;color:#4B5563;font-weight:400}
.fee-row .value{font-weight:400;color:#1a1a2e}
.fee-row .value.highlight{color:#FF6B35}
.fee-total{margin-top:4px;padding-top:8px;border-top:1px solid #edf0f5;display:flex;justify-content:space-between;align-items:flex-end}
.fee-total strong{font-size:13px;color:#1a1a2e}
.fee-total .amount{font-size:20px;color:#FF6B35;font-weight:800}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border:1px solid #edf0f5;border-radius:14px;background:#FFF8F1}
.toggle-copy{flex:1}
.toggle-copy strong{display:block;font-size:13px;color:#1a1a2e}
.toggle-copy span{display:none}
.switch{width:42px;height:24px;border-radius:12px;background:#d0d5dd;position:relative;cursor:pointer;flex:none;transition:.2s ease}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(15,23,42,.16);transition:.2s ease}
.switch.active{background:#FF6B35}
.switch.active::after{left:21px}
.switch.disabled{opacity:.55;cursor:not-allowed}
.info-list{display:grid;gap:0}
.info-row{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border:none;border-bottom:1px solid #f3f4f6;background:transparent;text-align:left;color:#1a1a2e;cursor:pointer}
.info-row:last-child{border-bottom:none}
.info-row .label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;color:#4B5563}
.info-row .hint{font-size:11px;color:#98a2b3;font-weight:400}
.info-row .right{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#1a1a2e;font-weight:400}
.info-row .right.red{color:#FF4D4F}
.info-row .arrow{font-size:16px;color:#98a2b3;line-height:1}
.info-row.static{cursor:default}
.info-row.coupon-available{margin:-2px 0 4px;padding:10px 12px;border:1px solid #FFDAB8;border-radius:14px;background:linear-gradient(135deg,#FFF8F1 0%,#fff 100%)}
.info-row.coupon-available .label::after{content:'有可用券';display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:9px;background:#FFF1E8;color:#FF6B35;font-size:10px;font-weight:700}
.urgent-config{display:none;margin-top:4px;padding-bottom:8px}
.insurance-card{background:linear-gradient(135deg,#F2F7FF,#FFFFFF);border:1px solid #DDEAFF}
.insurance-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.insurance-main{flex:1}
.insurance-title{font-size:13px;font-weight:800;color:#1a1a2e}
.insurance-sub{font-size:11px;color:#98a2b3;line-height:1.5;margin-top:3px}
.insurance-badge{display:inline-flex;align-items:center;margin-left:4px;padding:2px 6px;border-radius:999px;background:#FFF1EC;color:#FF6B35;font-size:10px;font-weight:700}
.option-label{font-size:12px;color:#98a2b3;margin-bottom:8px}
.option-group{display:flex;gap:8px;flex-wrap:wrap}
.option-group button{padding:6px 10px;border-radius:999px;border:1px solid #e5e7eb;background:#fff;color:#667085;font-size:11px;cursor:pointer}
.option-group button.active{background:#FFF1EC;border-color:#FF6B35;color:#FF6B35;font-weight:700}
.stepper-grid{display:grid;gap:6px}
.stepper-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 10px;border:1px solid #edf0f5;border-radius:12px;background:#fff}
.stepper-label{font-size:12px;color:#667085}
.stepper-controls{display:flex;align-items:center;gap:10px}
.step-btn{width:24px;height:24px;border:none;border-radius:12px;background:#FFF1EC;color:#FF6B35;font-size:15px;line-height:1;cursor:pointer}
.step-btn:disabled{background:#f3f4f6;color:#98a2b3;cursor:not-allowed}
.step-value{min-width:68px;text-align:center;font-size:12px;font-weight:700;color:#1a1a2e}
.note{display:none}
.urgent-fee-note{margin-top:8px;padding:9px 10px;border-radius:12px;background:#FFF7E6;color:#8A5A00;font-size:11px;line-height:1.6}
.urgent-fee-note strong{display:block;font-size:13px;color:#FF6B35;margin-bottom:2px}
.coupon-selector{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border:1px solid #edf0f5;border-radius:14px;cursor:pointer;background:#FFFDF9}
.coupon-info{flex:1}
.coupon-label{display:none}
.coupon-value{font-size:13px;color:#1a1a2e;font-weight:800;margin-top:0}
.coupon-desc{display:none}
.coupon-btn{height:28px;padding:0 10px;border:none;border-radius:14px;background:#4A6CF7;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.payment-option{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border:1px solid #edf0f5;border-radius:14px;cursor:pointer}
.payment-option+.payment-option{margin-top:6px}
.payment-option.active{border-color:#FF6B35;background:#FFF8F1}
.payment-radio{width:18px;height:18px;border:2px solid #d0d5dd;border-radius:50%;margin-top:3px;position:relative;flex:none}
.payment-option.active .payment-radio{border-color:#FF6B35}
.payment-option.active .payment-radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:#FF6B35}
.payment-info{flex:1}
.payment-name{font-size:13px;font-weight:700;color:#1a1a2e}
.payment-desc{font-size:11px;color:#8c8c8c;line-height:1.5;margin-top:2px}
.payment-desc .recharge-link{display:inline-flex;align-items:center;margin-left:8px;padding:2px 8px;border-radius:999px;background:#FFF1EC;color:#FF6B35;font-weight:700;text-decoration:none}
.payment-card{margin-bottom:18px}
.submit-btn{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);width:calc(100% - 32px);max-width:343px;height:50px;border:none;border-radius:25px;background:linear-gradient(135deg,#FF6B35,#FF8F65);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 14px 30px rgba(255,107,53,.24)}
.drawer-mask{position:fixed;inset:0;background:rgba(0,0,0,.52);display:none;align-items:flex-end;justify-content:center;z-index:40}
.drawer-mask.show{display:flex}
.drawer{width:100%;max-width:375px;background:#fff;border-radius:24px 24px 0 0;max-height:72vh;overflow:hidden;box-shadow:0 -16px 32px rgba(17,24,39,.18)}
.drawer-handle{width:42px;height:4px;border-radius:999px;background:#d0d7de;margin:10px auto 6px}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:0 16px 14px}
.drawer-title{font-size:15px;font-weight:700;color:#1a1a2e}
.drawer-close{width:28px;height:28px;border:none;border-radius:14px;background:#f5f6fa;color:#667085;font-size:16px;cursor:pointer}
.drawer-list{padding:0 16px 20px;max-height:calc(72vh - 56px);overflow:auto}
.coupon-option{border:1px solid #edf0f5;border-radius:14px;padding:14px;background:#fff;margin-top:10px;cursor:pointer}
.coupon-option:first-child{margin-top:0}
.coupon-option.active{border-color:#FF6B35;background:#FFF8F1;box-shadow:0 0 0 3px rgba(255,107,53,.08)}
.coupon-option.available{background:linear-gradient(135deg,#FFF8F1 0%,#fff 100%);border-color:#FFDAB8}
.coupon-option .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.coupon-option .amount{font-size:22px;font-weight:800;color:#FF6B35;line-height:1.3}
.coupon-option .status-tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:#FFF1E8;color:#FF6B35;font-size:11px;font-weight:700}
.coupon-option .name{font-size:14px;font-weight:700;color:#1a1a2e}
.coupon-option .desc{font-size:12px;color:#8c8c8c;line-height:1.6;margin-top:8px}
.coupon-rules{margin-top:10px;border-top:1px solid rgba(237,240,245,.9);padding-top:8px}
.coupon-rules summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:10px;color:#667085;font-size:12px;font-weight:700;line-height:1.7;cursor:pointer}
.coupon-rules summary::-webkit-details-marker{display:none}
.coupon-rules summary::after{content:'展开';font-size:11px;color:#98a2b3;font-weight:600}
.coupon-rules[open] summary::after{content:'收起'}
.coupon-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.coupon-meta span{padding:7px 8px;border-radius:10px;background:#F8FAFC;color:#667085;font-size:11px;line-height:1.5}
.validity-wheel{height:220px;overflow-y:auto;scroll-snap-type:y mandatory;padding:84px 0;border-radius:16px;background:linear-gradient(180deg,#F8FAFC,#FFFFFF 28%,#FFFFFF 72%,#F8FAFC);position:relative}
.validity-wheel::before{content:'';position:absolute;left:12px;right:12px;top:50%;height:42px;transform:translateY(-50%);border-radius:14px;background:#FFF1EC;border:1px solid #FFD8C7;pointer-events:none}
.validity-wheel-option{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100%;height:42px;border:none;background:transparent;color:#667085;font-size:14px;font-weight:400;scroll-snap-align:center;cursor:pointer}
.validity-wheel-option.active{color:#FF6B35;font-size:18px;font-weight:700}
.pay-bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:375px;padding:10px 16px 18px;background:#fff;display:flex;align-items:center;gap:12px;box-shadow:0 -8px 24px rgba(15,23,42,.08);z-index:30}
.fee-detail-btn{border:none;background:transparent;color:#4B5563;font-size:12px;font-weight:400;white-space:nowrap;cursor:pointer}
.submit-btn{position:static;transform:none;flex:1;width:auto;max-width:none;height:46px;border-radius:23px;font-size:15px;box-shadow:0 10px 24px rgba(255,107,53,.22)}
.fee-drawer-total{margin-top:8px;padding-top:12px;border-top:1px solid #edf0f5}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="nav"><a href="#" class="back" id="backLink">←</a><span class="title">确认订单</span><span class="placeholder"></span></div>

<div class="progress">
  <div class="step done"><div class="num">✓</div>填写信息</div>

</div>

<div class="card">
  <div class="card-head">
    <div class="card-title">任务信息</div>

  </div>

<div class="card">
  <div class="info-list">
    <button class="info-row" id="couponRow" type="button">

      <span class="right" id="couponRight"><span id="couponValue">不使用</span><span class="arrow">›</span></span>

    <button class="info-row" id="validityRow" type="button">
      <span class="label">接单有效期</span>
      <span class="right"><span id="validityValue">12小时</span><span class="arrow">›</span></span>
    </button>
    <div class="info-row static">
      <span class="label">急单置顶<span class="hint">开启后优先曝光给附近服务者</span></span>

        <span class="stepper-label">置顶范围</span>
        <div class="stepper-controls">
          <button class="step-btn" id="urgentRangeMinusBtn" type="button">−</button>
          <span class="step-value" id="urgentRangeValue">10km</span>
          <button class="step-btn" id="urgentRangePlusBtn" type="button">＋</button>
        </div>
      </div>
      <div class="stepper-row">
        <span class="stepper-label">置顶时长</span>
        <div class="stepper-controls">
          <button class="step-btn" id="urgentDurationMinusBtn" type="button">−</button>
          <span class="step-value" id="urgentDurationValue">2小时</span>
          <button class="step-btn" id="urgentDurationPlusBtn" type="button">＋</button>

      <div class="payment-desc">当前余额 ¥368.50</a></div>

    </div>

      <div class="fee-row"><span>任务金额</span><span class="value" id="rewardSummary"></span></div>

      <div class="fee-row"><span>急单置顶费</span><span class="value" id="urgentTopSummary"></span></div>
      <div class="fee-row"><span>优惠券抵扣</span><span class="value highlight" id="couponSummary"></span></div>
      <div class="fee-total fee-drawer-total"><strong>实付金额</strong><span class="amount" id="totalAmount"></span></div>
    </div>

<script src="time-utils.js"></script>
<script src="publish-flow-config.js"></script>
<script src="urgent-top-data.js"></script>
<script src="coupon-data.js"></script>
<script>
(function(){
const PUBLISHED_ORDER_KEY='banxing.latestPublishedOrder';
const params=new URLSearchParams(location.search);
const draft=PublishFlowConfig.readDraft();
const authState=JSON.parse(localStorage.getItem('authState')||'{}');
const projectKey=PublishFlowConfig.resolveProjectKey(params.get('project')||draft.projectKey||params.get('type')||'');
const project=PublishFlowConfig.getProject(projectKey);
if(!project||!draft.taskActions||!draft.reward){
  location.replace('publish-items.html?project='+encodeURIComponent(projectKey||''));
  return;
}

const insuranceRequired=!!project.highRisk;
let insuranceSelected=insuranceRequired?true:(typeof draft.insuranceSelected==='boolean'?draft.insuranceSelected:project.insuranceDefault);
let urgentTopEnabled=!!draft.urgentTopEnabled;
let urgentTopKm=normalizeUrgentTopKm(draft.urgentTopKm||10);
let urgentTopDurationHours=normalizeUrgentTopDurationHours(draft.urgentTopDurationHours||2);
let selectedCouponId=draft.selectedCouponId||'';
let couponAutoSelected=false;
let paymentMethod=draft.paymentMethod||'balance';
let validityHours=Number(draft.validityHours||12);
const couponDrawerMask=document.getElementById('couponDrawerMask');
const validityDrawerMask=document.getElementById('validityDrawerMask');
const feeDrawerMask=document.getElementById('feeDrawerMask');

function normalizeUrgentTopKm(value){
  const parsed=Math.round(Number(value||10)/10)*10;
  return Math.max(10,Math.min(100,parsed));
}

function normalizeUrgentTopDurationHours(value){
  const parsed=Math.round(Number(value||2));
  return Math.max(1,Math.min(24,parsed));
}

function formatMoney(amount){
  return BanxingCoupons.formatMoney(Number(amount||0));
}

function formatCouponDeduction(amount){
  const value=Number(amount||0);
  return '-'+(value%1===0?value.toFixed(0):value.toFixed(2))+' 元';
}

function formatValidityLabel(hours){
  return Number(hours||12)+'小时';
}

function normalizeInsuranceText(){
  return insuranceSelected?'🛡️ 已购保险':'未购保险';
}

function getInsuranceFee(){
  return insuranceSelected?Number(project.insuranceFee||0):0;
}

function getUrgentTopFee(){
  return urgentTopEnabled?BanxingUrgentTop.getFeeByKm(urgentTopKm,urgentTopDurationHours):0;
}

function getTaskAmount(){
  const reward=Number(draft.reward||0);
  if(reward>0)return reward;
  const formReward=Number(draft.formData&&draft.formData.reward||0);
  if(formReward>0)return formReward;
  return Number(project&&project.rewardMin||0);
}

function getTotalBeforeCoupon(){
  return getTaskAmount()+getInsuranceFee()+getUrgentTopFee();
}

function getSelectedCoupon(){
  if(!selectedCouponId)return null;
  const coupon=BanxingCoupons.getById(selectedCouponId);
  if(!coupon||coupon.status!=='unused'||coupon.threshold>getTaskAmount()){
    selectedCouponId='';
    return null;
  }
  return coupon;
}

function getCouponAmount(){
  const coupon=getSelectedCoupon();
  return coupon?Math.min(Number(coupon.amount||0),getTaskAmount()):0;
}

function sortCouponByBestDiscount(a,b){
  const amountDiff=Number(b.amount||0)-Number(a.amount||0);
  if(amountDiff!==0)return amountDiff;
  const dateDiff=new Date(a.validTo)-new Date(b.validTo);
  if(dateDiff!==0)return dateDiff;
  return String(a.id||'').localeCompare(String(b.id||''));
}

function getBestEligibleCoupon(){
  return BanxingCoupons.eligible(getTaskAmount()).slice().sort(sortCouponByBestDiscount)[0]||null;
}

function autoSelectCouponOnce(){
  if(couponAutoSelected)return;
  couponAutoSelected=true;
  if(selectedCouponId)return;
  const bestCoupon=getBestEligibleCoupon();
  if(bestCoupon){
    selectedCouponId=bestCoupon.id;
  }
}

function renderSummary(){
  document.getElementById('backLink').href='publish-items.html?category='+encodeURIComponent(draft.categoryKey||project.categoryKey)+'&project='+encodeURIComponent(project.key);
  document.getElementById('editLink').href='publish-items.html?category='+encodeURIComponent(draft.categoryKey||project.categoryKey)+'&project='+encodeURIComponent(project.key);
  document.getElementById('summaryType').textContent=PublishFlowConfig.createTaskTitle(project,draft.taskActions,{
    durationText:draft.durationText,
    roughLocation:draft.roughLocation||draft.locationSummary
  });
  document.getElementById('summaryTime').textContent=BanxingTimeUtils.formatTaskTime(draft.scheduleSummary)||draft.scheduleSummary||'';
  document.getElementById('summaryLocation').textContent=draft.locationSummary||draft.roughLocation||'';
}

function renderInsuranceState(){
  if(insuranceRequired)insuranceSelected=true;
  document.getElementById('insuranceTitle').innerHTML='保险 '+(insuranceRequired?'<span class="insurance-badge">必选</span>':'<span class="insurance-badge">可选</span>');
  document.getElementById('insuranceDesc').textContent=project.insuranceName+' · '+formatMoney(project.insuranceFee);
  document.getElementById('insuranceToggle').classList.toggle('active',insuranceSelected);
  document.getElementById('insuranceToggle').classList.toggle('disabled',insuranceRequired);
}

function renderUrgentOptions(){
  urgentTopKm=normalizeUrgentTopKm(urgentTopKm);
  urgentTopDurationHours=normalizeUrgentTopDurationHours(urgentTopDurationHours);
  document.getElementById('urgentConfig').style.display=urgentTopEnabled?'block':'none';
  document.getElementById('urgentToggle').classList.toggle('active',urgentTopEnabled);
  document.getElementById('urgentRangeValue').textContent=urgentTopKm+'km';
  document.getElementById('urgentDurationValue').textContent=BanxingUrgentTop.getDurationLabel(urgentTopDurationHours);
  document.getElementById('urgentRangeMinusBtn').disabled=urgentTopKm<=10;
  document.getElementById('urgentRangePlusBtn').disabled=urgentTopKm>=100;
  document.getElementById('urgentDurationMinusBtn').disabled=urgentTopDurationHours<=1;
  document.getElementById('urgentDurationPlusBtn').disabled=urgentTopDurationHours>=24;
  document.getElementById('urgentFeeNote').innerHTML=
    '<strong>置顶费用 '+BanxingUrgentTop.formatMoney(getUrgentTopFee())+'</strong>'+
    '默认 10km、1小时为 ¥5.00；范围每增加 10km 或时长每增加 1 小时，费用增加 ¥5.00。若订单取消，置顶费不退。';
}

function renderValidityOptions(){
  document.getElementById('validityValue').textContent=formatValidityLabel(validityHours);
  document.getElementById('validityOptions').innerHTML=Array.from({length:48},function(_,index){
    const hours=index+1;
    return '<button class="validity-wheel-option '+(Number(hours)===validityHours?'active':'')+'" type="button" data-validity-hours="'+hours+'">'+hours+' 小时</button>';
  }).join('');
}

function renderCouponDrawer(){
  const selectedCoupon=getSelectedCoupon();
  const eligibleCoupons=BanxingCoupons.eligible(getTaskAmount()).slice().sort(sortCouponByBestDiscount);
  let html='<div class="coupon-option '+(!selectedCoupon?'active':'')+'" data-coupon-id=""><div class="top"><div class="amount">不使用优惠券</div><span class="status-tag">默认</span></div><div class="desc">当前订单不做优惠券抵扣</div></div>';
  if(eligibleCoupons.length){
    html+=eligibleCoupons.map(function(item){
      return (
        '<div class="coupon-option available '+(selectedCoupon&&selectedCoupon.id===item.id?'active':'')+'" data-coupon-id="'+item.id+'">'+
          '<div class="top"><div class="amount">'+BanxingCoupons.displayText(item)+'</div><span class="status-tag">'+BanxingCoupons.statusLabel(item.status)+'</span></div>'+
          '<div class="name">'+item.name+'</div>'+
          '<div class="desc">有效期 '+BanxingCoupons.formatDateRange(item.validFrom,item.validTo)+'</div>'+
          '<details class="coupon-rules">'+
            '<summary>使用规则</summary>'+
            '<div class="coupon-meta">'+
              '<span>门槛：'+BanxingCoupons.thresholdLabel(item)+'</span>'+
              '<span>范围：'+(item.useScope||'全部服务项目')+'</span>'+
              '<span>抵扣：'+(item.deductionScope||'仅抵扣任务金额')+'</span>'+
              '<span>叠加：'+(item.stackable?'可叠加':'不可叠加')+'</span>'+
            '</div>'+
          '</details>'+
        '</div>'
      );
    }).join('');
  }else{
    html+='<div class="coupon-option"><div class="name">暂无可用优惠券</div><div class="desc">当前订单金额暂不满足优惠券条件，或你暂时没有待使用优惠券。</div></div>';
  }
  document.getElementById('couponDrawerList').innerHTML=html;
}

function renderCouponSelector(){
  const selectedCoupon=getSelectedCoupon();
  const bestCoupon=getBestEligibleCoupon();
  const couponRow=document.getElementById('couponRow');
  couponRow.classList.toggle('coupon-available',!!bestCoupon);
  document.getElementById('couponRight').classList.toggle('red',!!selectedCoupon);
  if(selectedCoupon){
    document.getElementById('couponValue').textContent=formatCouponDeduction(selectedCoupon.amount);
  }else if(bestCoupon){
    document.getElementById('couponValue').textContent='可用 '+formatCouponDeduction(bestCoupon.amount);
  }else{
    document.getElementById('couponValue').textContent='不使用';
  }
}

function renderFees(){
  const couponAmount=getCouponAmount();
  const total=Math.max(0,getTotalBeforeCoupon()-couponAmount);
  document.getElementById('rewardSummary').textContent=formatMoney(draft.reward);
  document.getElementById('insuranceFeeSummary').textContent=formatMoney(getInsuranceFee());
  document.getElementById('urgentTopSummary').textContent=formatMoney(getUrgentTopFee());
  document.getElementById('couponSummary').textContent='-'+formatMoney(couponAmount);
  document.getElementById('totalAmount').textContent=formatMoney(total);
  document.getElementById('submitBtn').textContent=(paymentMethod==='wechat'?'微信支付 ':'余额支付 ')+formatMoney(total);
}

function renderPaymentState(){
  document.querySelectorAll('[data-payment-option]').forEach(function(node){
    node.classList.toggle('active',node.dataset.paymentOption===paymentMethod);
  });
}

function saveDraft(){
  draft.projectKey=project.key;
  draft.insuranceSelected=insuranceSelected;
  draft.insuranceSummary=normalizeInsuranceText();
  draft.insuranceFee=String(getInsuranceFee().toFixed(2));
  draft.urgentTopEnabled=urgentTopEnabled;
  draft.urgentTopKm=urgentTopKm;
  draft.urgentTopDurationHours=urgentTopDurationHours;
  draft.selectedCouponId=selectedCouponId;
  draft.paymentMethod=paymentMethod;
  draft.validityHours=validityHours;
  draft.validityLabel=formatValidityLabel(validityHours);
  PublishFlowConfig.writeDraft(draft);
}

function renderAll(){
  autoSelectCouponOnce();
  renderSummary();
  renderInsuranceState();
  renderUrgentOptions();
  renderValidityOptions();
  renderPaymentState();
  renderCouponSelector();
  renderFees();
  saveDraft();
}

function openCouponDrawer(){
  renderCouponDrawer();
  couponDrawerMask.classList.add('show');
}

function closeCouponDrawer(){
  couponDrawerMask.classList.remove('show');
}

function openValidityDrawer(){
  renderValidityOptions();
  validityDrawerMask.classList.add('show');
  setTimeout(function(){
    const active=document.querySelector('.validity-wheel-option.active');
    if(active)active.scrollIntoView({block:'center'});
  },0);
}

function closeValidityDrawer(){
  validityDrawerMask.classList.remove('show');
}

function openFeeDrawer(){
  feeDrawerMask.classList.add('show');
}

function closeFeeDrawer(){
  feeDrawerMask.classList.remove('show');
}

function buildPublishedOrderRecord(orderId,selectedCoupon){
  const couponAmount=getCouponAmount();
  const urgentTopFee=getUrgentTopFee();
  const paidAmount=Math.max(0,getTotalBeforeCoupon()-couponAmount);
  const formData=draft.formData||{};
  const otherSupplement=(project.extraFields||[]).map(function(field){
    const rawValue=formData[field.key];
    const value=Array.isArray(rawValue)?rawValue.filter(Boolean).join('、'):String(rawValue||'').trim();
    if(!value)return null;
    return {label:field.label,value:value};
  }).filter(Boolean);
  const urgentTop=urgentTopEnabled?{
    enabled:true,
    km:urgentTopKm,
    fee:urgentTopFee,
    durationHours:urgentTopDurationHours,
    durationLabel:BanxingUrgentTop.getDurationLabel(urgentTopDurationHours),
    paymentMethod:paymentMethod==='wechat'?'微信支付':'平台余额',
    paidAt:new Date().toISOString()
  }:null;
  return {
    id:orderId,
    role:'published',
    roleLabel:'我发的',
    roleClass:'published',
    typeKey:project.orderTypeKey||'health',
    title:draft.listTitle||PublishFlowConfig.createTaskTitle(project,draft.taskActions,{
      durationText:draft.durationText,
      roughLocation:draft.roughLocation||draft.locationSummary
    }),
    price:formatMoney(draft.reward),
    priceUnit:'/次',
    status:'waiting',
    time:BanxingTimeUtils.formatTaskTime(draft.scheduleSummary)||draft.scheduleSummary||'',
    location:draft.roughLocation||'',
    partner:'',
    insurance:normalizeInsuranceText(),
    taskRequirements:draft.taskRequirements||formData.taskRequirements||'',
    detailDescription:draft.detailDescription||formData.detailDescription||'',
    detailImages:Array.isArray(draft.detailImages)&&draft.detailImages.length?draft.detailImages.slice():(Array.isArray(formData.detailImages)?formData.detailImages.slice():[]),
    otherSupplement:otherSupplement,
    desc:'接单有效期 '+formatValidityLabel(validityHours)+'，等待服务者接单申请。',
    applicants:0,
    urgentTop:urgentTop,
    validityHours:validityHours,
    validityLabel:formatValidityLabel(validityHours),
    finance:{
      topFee:formatMoney(urgentTopFee),
      coupon:formatMoney(couponAmount),
      refund:'¥0.00',
      paid:formatMoney(paidAmount),
      reward:formatMoney(draft.reward),
      insuranceFee:formatMoney(getInsuranceFee()),
      paymentMethod:paymentMethod==='wechat'?'微信支付':'平台余额',
      note:selectedCoupon
        ? ('发布时已使用 '+selectedCoupon.name+'（'+BanxingCoupons.displayText(selectedCoupon)+'）抵扣，当前订单尚未开始履约。')
        : '当前订单未使用优惠券，已完成支付。'
    }
  };
}

function submitPublish(){
  if(['banned','frozen'].includes(authState.accountStatus)){
    const label=authState.accountStatus==='frozen'?'冻结':'封禁';
    if(confirm('账号已'+label+'，暂不可发布任务。是否前往提交解封申诉？')){
      location.href='account-ban-appeal.html?from=publish-confirm&back='+encodeURIComponent(location.pathname.split('/').pop()+location.search);
    }
    return;
  }
  const orderId='p'+String(Date.now()).slice(-6);
  const selectedCoupon=getSelectedCoupon();
  saveDraft();
  draft.lastPublishedOrderId=orderId;
  PublishFlowConfig.writeDraft(draft);
  const publishedOrder=buildPublishedOrderRecord(orderId,selectedCoupon);
  if(selectedCoupon){
    BanxingCoupons.markUsed(selectedCoupon.id,{
      usedAt:new Date().toISOString().slice(0,10),
      usedOrderId:orderId.toUpperCase(),
      usedOrderTitle:draft.listTitle||PublishFlowConfig.createTaskTitle(project,draft.taskActions,{
        durationText:draft.durationText,
        roughLocation:draft.roughLocation||draft.locationSummary
      })
    });
  }
  localStorage.setItem(PUBLISHED_ORDER_KEY,JSON.stringify(publishedOrder));
  if(publishedOrder.urgentTop&&publishedOrder.urgentTop.enabled){
    BanxingUrgentTop.saveForOrder(orderId,{
      enabled:true,
      km:publishedOrder.urgentTop.km,
      fee:publishedOrder.urgentTop.fee,
      durationHours:publishedOrder.urgentTop.durationHours,
      durationLabel:publishedOrder.urgentTop.durationLabel,
      paymentMethod:publishedOrder.urgentTop.paymentMethod,
      paidAt:publishedOrder.urgentTop.paidAt
    });
  }
  if(paymentMethod==='wechat'){
    alert('正在拉起微信支付...\n支付完成后将自动发布任务');
  }
  location.href='publish-success.html';
}

document.getElementById('insuranceToggle').addEventListener('click',function(){
  if(insuranceRequired)return;
  insuranceSelected=!insuranceSelected;
  renderAll();
});
document.getElementById('urgentToggle').addEventListener('click',function(){
  urgentTopEnabled=!urgentTopEnabled;
  renderAll();
});
document.getElementById('urgentRangeMinusBtn').addEventListener('click',function(){
  urgentTopEnabled=true;
  urgentTopKm=normalizeUrgentTopKm(urgentTopKm-10);
  renderAll();
});
document.getElementById('urgentRangePlusBtn').addEventListener('click',function(){
  urgentTopEnabled=true;
  urgentTopKm=normalizeUrgentTopKm(urgentTopKm+10);
  renderAll();
});
document.getElementById('urgentDurationMinusBtn').addEventListener('click',function(){
  urgentTopEnabled=true;
  urgentTopDurationHours=normalizeUrgentTopDurationHours(urgentTopDurationHours-1);
  renderAll();
});
document.getElementById('urgentDurationPlusBtn').addEventListener('click',function(){
  urgentTopEnabled=true;
  urgentTopDurationHours=normalizeUrgentTopDurationHours(urgentTopDurationHours+1);
  renderAll();
});
document.getElementById('validityOptions').addEventListener('click',function(event){
  const button=event.target.closest('[data-validity-hours]');
  if(!button)return;
  validityHours=Number(button.dataset.validityHours||12);
  closeValidityDrawer();
  renderAll();
});
document.querySelectorAll('[data-payment-option]').forEach(function(option){
  option.addEventListener('click',function(){
    paymentMethod=option.dataset.paymentOption||'balance';
    document.querySelectorAll('[data-payment-option]').forEach(function(node){
      node.classList.toggle('active',node===option);
    });
    renderFees();
    saveDraft();
  });
});
document.getElementById('couponRow').addEventListener('click',openCouponDrawer);
document.getElementById('couponDrawerCloseBtn').addEventListener('click',closeCouponDrawer);
couponDrawerMask.addEventListener('click',function(event){
  if(event.target===couponDrawerMask)closeCouponDrawer();
});
document.getElementById('couponDrawerList').addEventListener('click',function(event){
  if(event.target.closest('.coupon-rules'))return;
  const option=event.target.closest('[data-coupon-id]');
  if(!option)return;
  selectedCouponId=option.dataset.couponId||'';
  closeCouponDrawer();
  renderAll();
});
document.getElementById('validityRow').addEventListener('click',openValidityDrawer);
document.getElementById('validityDrawerCloseBtn').addEventListener('click',closeValidityDrawer);
validityDrawerMask.addEventListener('click',function(event){
  if(event.target===validityDrawerMask)closeValidityDrawer();
});
document.getElementById('feeDetailBtn').addEventListener('click',openFeeDrawer);
document.getElementById('feeDrawerCloseBtn').addEventListener('click',closeFeeDrawer);
feeDrawerMask.addEventListener('click',function(event){
  if(event.target===feeDrawerMask)closeFeeDrawer();
});
document.getElementById('submitBtn').addEventListener('click',submitPublish);

renderAll();
})();
</script>
</body>
