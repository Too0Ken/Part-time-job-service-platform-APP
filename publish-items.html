<style>

body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh;padding-bottom:102px;color:#1a1a2e}

.toast{position:fixed;top:94px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(26,26,46,.92);color:#fff;padding:10px 14px;border-radius:14px;font-size:12px;opacity:0;pointer-events:none;transition:.22s ease;z-index:80;max-width:320px;text-align:center;box-shadow:0 12px 28px rgba(0,0,0,.18)}

.dialog{width:100%;max-width:375px;height:70vh;background:#fff;border-radius:24px 24px 0 0;padding:16px 16px 24px;display:flex;flex-direction:column}

</style>

<script src="time-utils.js"></script>
<script src="publish-flow-config.js"></script>
<script>
(function(){
function runSimplifiedPublish(){
const authState=JSON.parse(localStorage.getItem('authState')||'{}');
if(['banned','frozen'].includes(authState.accountStatus)){
  const label=authState.accountStatus==='frozen'?'冻结':'封禁';
  if(confirm('账号已'+label+'，暂不可发布任务。是否前往提交解封申诉？')){
    location.replace('account-ban-appeal.html?from=publish&back='+encodeURIComponent(location.pathname.split('/').pop()+location.search));
  }else{
    location.replace('fuwuzhe_home.html');
  }
  return true;
}
const params=new URLSearchParams(location.search);
let draft=PublishFlowConfig.readDraft();
let selectedProjectKey=PublishFlowConfig.resolveProjectKey(params.get('project')||params.get('type')||'');
let selectedProject=PublishFlowConfig.getProject(selectedProjectKey);
const editMode=params.get('mode')==='edit';
const editSnapshot={
  orderId:String(params.get('orderId')||params.get('id')||'').trim(),
  title:String(params.get('title')||'').trim(),
  time:String(params.get('time')||'').trim(),
  location:String(params.get('location')||'').trim(),
  price:String(params.get('price')||'').trim(),
  detailDescription:String(params.get('detailDescription')||'').trim(),
  taskRequirements:String(params.get('taskRequirements')||'').trim(),
  detailImages:(function(){
    const raw=params.get('detailImages')||'';
    if(!raw)return [];
    try{
      const parsed=JSON.parse(raw);
      return Array.isArray(parsed)?parsed.filter(Boolean):[];
    }catch(error){
      return [];
    }
  })()
};
let activeCategoryKey=params.get('category')||(selectedProject?selectedProject.categoryKey:'')||PublishFlowConfig.categories[0].key;
let selectorOpen=false;
let selectorKeyword='';
let selectorKeywordDraft='';
let pendingDraft=null;
let toastTimer;
let formDataCache=selectedProject?Object.assign({},draft.formData||{}):{};
if(editMode){
  const queryTime=String(editSnapshot.time||'');
  const parseSchedule=function(text){
    const source=String(text||'').trim();
    if(!source)return {start:'',end:''};
    const dateMatch=source.match(/(\d{4})[年\-\/](\d{1,2})[月\-\/](\d{1,2})[日\s]?/);
    const timeRangeMatch=source.match(/(\d{1,2}):(\d{2})(?:\s*[-~–—至]\s*(\d{1,2}):(\d{2}))?/);
    const fallbackStart=defaultDateTime(14);
    if(!dateMatch){
      return {start:fallbackStart,end:addMinutesToInput(fallbackStart,120)};
    }
    const year=Number(dateMatch[1]);
    const month=Number(dateMatch[2]);
    const day=Number(dateMatch[3]);
    const startHour=timeRangeMatch?Number(timeRangeMatch[1]):9;
    const startMinute=timeRangeMatch?Number(timeRangeMatch[2]):0;
    const startDate=new Date(year,month-1,day,startHour,startMinute,0,0);
    if(Number.isNaN(startDate.getTime())){
      return {start:fallbackStart,end:addMinutesToInput(fallbackStart,120)};
    }
    const start=toLocalDateTimeInput(startDate);
    if(timeRangeMatch&&timeRangeMatch[3]){
      const endHour=Number(timeRangeMatch[3]);
      const endMinute=Number(timeRangeMatch[4]);
      const endDate=new Date(year,month-1,day,endHour,endMinute,0,0);
      if(!Number.isNaN(endDate.getTime())&&endDate>startDate){
        return {start:start,end:toLocalDateTimeInput(endDate)};
      }
    }
    return {start:start,end:addMinutesToInput(start,minutesFromDurationText(draft.durationText)||120)};
  };
  const schedule=parseSchedule(queryTime);
  formDataCache=Object.assign({},formDataCache,{
    startDateTime:formDataCache.startDateTime||schedule.start,
    endDateTime:formDataCache.endDateTime||schedule.end,
    taskRequirements:formDataCache.taskRequirements||editSnapshot.taskRequirements,
    detailDescription:formDataCache.detailDescription||editSnapshot.detailDescription||editSnapshot.title,
    reward:formDataCache.reward||editSnapshot.price.replace(/[^\d.]/g,''),
    roughLocation:formDataCache.roughLocation||editSnapshot.location,
    detailImages:formDataCache.detailImages||editSnapshot.detailImages
  });
}
if(!formDataCache.startDateTime&&draft.serviceDate&&draft.serviceTime){
  formDataCache.startDateTime=draft.serviceDate+'T'+draft.serviceTime;
}
if(!formDataCache.endDateTime&&formDataCache.startDateTime){
  formDataCache.endDateTime=addMinutesToInput(formDataCache.startDateTime,minutesFromDurationText(draft.durationText)||120);
}
let detailImages=normalizeImages(selectedProject?(formDataCache.detailImages||draft.detailImages||[]):[]);
let selectedLocationId=selectedProject?(formDataCache.selectedLocationId||draft.selectedLocationId||''):'';
let selectedLocationText=selectedProject?(formDataCache.roughLocation||draft.roughLocation||''):'';
if(editMode&&editSnapshot.orderId&&selectedProject&&!formDataCache.detailDescription){
  formDataCache.detailDescription=editSnapshot.title||formDataCache.detailDescription;
}

function escapeHtml(text){
  return String(text||'').replace(/[&<>"']/g,function(char){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char];
  });
}

function pad(value){
  return String(value).padStart(2,'0');
}

function toLocalDateTimeInput(date){
  return date.getFullYear()+'-'+pad(date.getMonth()+1)+'-'+pad(date.getDate())+'T'+pad(date.getHours())+':'+pad(date.getMinutes());
}

function defaultDateTime(hour){
  const date=new Date(Date.now()+24*60*60*1000);
  date.setHours(hour,0,0,0);
  return toLocalDateTimeInput(date);
}

function addMinutesToInput(input,minutes){
  const date=new Date(input);
  if(Number.isNaN(date.getTime()))return defaultDateTime(16);
  date.setMinutes(date.getMinutes()+Number(minutes||0));
  return toLocalDateTimeInput(date);
}

function minutesFromDurationText(text){
  const value=String(text||'');
  if(value.indexOf('半天')>-1)return 240;
  if(value.indexOf('全天')>-1)return 480;
  const hour=value.match(/(\d+(?:\.\d+)?)\s*小时/);
  if(hour)return Math.round(Number(hour[1])*60);
  const minute=value.match(/(\d+(?:\.\d+)?)\s*分钟/);
  if(minute)return Math.round(Number(minute[1]));
  return 0;
}

function formatDateTimeDisplay(value){
  return BanxingTimeUtils.formatDateTime(value)||String(value||'').replace('T',' ');
}

function deriveDurationText(start,end){
  const startDate=new Date(start);
  const endDate=new Date(end);
  const diff=Math.round((endDate-startDate)/60000);
  if(!Number.isFinite(diff)||diff<=0)return '';
  if(diff>=1440&&diff%1440===0)return (diff/1440)+'天';
  if(diff>=60&&diff%60===0)return (diff/60)+'小时';
  if(diff>=60)return (Math.round(diff/60*10)/10)+'小时';
  return diff+'分钟';
}

function normalizeImages(list){
  return (Array.isArray(list)?list:[]).map(function(item,index){
    if(typeof item==='string'){
      return {id:'seed-'+index,name:item};
    }
    return {id:item.id||('seed-'+index),name:item.name||('图片'+(index+1))};
  }).slice(0,5);
}

function extractFileLabel(name,index){
  const clean=String(name||'').trim();
  if(!clean)return '图片'+index;
  const noExt=clean.replace(/\.[^.]+$/,'').trim();
  return (noExt||('图片'+index)).slice(0,18);
}

function formatRewardValue(value){
  const amount=Number(value);
  if(!Number.isFinite(amount))return '';
  return Number.isInteger(amount)?String(amount):String(Math.round(amount*100)/100);
}

function getRewardRangeText(project){
  const min=Number(project&&project.rewardMin);
  const max=Number(project&&project.rewardMax);
  if(Number.isFinite(min)&&Number.isFinite(max)&&min>0&&max>=min){
    return '¥'+formatRewardValue(min)+'-¥'+formatRewardValue(max);
  }
  return String(project&&project.avgRangeText||'');
}

function getRewardRecommend(project){
  const min=Number(project&&project.rewardMin);
  const max=Number(project&&project.rewardMax);
  if(Number.isFinite(min)&&Number.isFinite(max)&&min>0&&max>=min){
    return Math.round(((min+max)/2)/5)*5;
  }
  const match=String(project&&project.avgRangeText||'').match(/(\d+(?:\.\d+)?)\s*-\s*(\d+(?:\.\d+)?)/);
  if(!match)return '';
  const rangeMin=Number(match[1]);
  const rangeMax=Number(match[2]);
  if(!Number.isFinite(rangeMin)||!Number.isFinite(rangeMax)||rangeMax<rangeMin)return '';
  return Math.round(((rangeMin+rangeMax)/2)/5)*5;
}

function getRewardHintHtml(project){
  const rangeText=escapeHtml(getRewardRangeText(project));
  const recommendText=formatRewardValue(getRewardRecommend(project));
  if(!recommendText)return '💡 定价参考：'+rangeText;
  return '💡 定价参考：'+rangeText+'，建议出价约 <button class="fill-price" type="button" data-fill-reward="'+recommendText+'">¥'+recommendText+'</button><span class="hint-sub">点击推荐价格可一键填入，仍可继续修改，系统不强制定价。</span>';

function renderField(field){
  const requiredHtml=field.required?' <span class="req">*</span>':'';
  const hasHint=typeof field.hintHtml==='string'?field.hintHtml.length>0:!!field.hint;
  const hintClass=field.hintClass?' '+field.hintClass:'';
  const hintHtml=hasHint?'<div class="field-hint'+hintClass+'">'+(typeof field.hintHtml==='string'?field.hintHtml:escapeHtml(field.hint))+'</div>':'';
  const value=getInitialValue(field);
  if(field.type==='textarea'){
    return '<div class="field"><label>'+escapeHtml(field.label)+requiredHtml+'</label><textarea data-field-key="'+escapeHtml(field.key)+'" placeholder="'+escapeHtml(field.placeholder||'')+'">'+escapeHtml(value)+'</textarea>'+hintHtml+'</div>';
  }
  if(field.type==='select'){
    return '<div class="field"><label>'+escapeHtml(field.label)+requiredHtml+'</label><select data-field-key="'+escapeHtml(field.key)+'">'+field.options.map(function(option){
      return '<option value="'+escapeHtml(option)+'" '+(option===value?'selected':'')+'>'+escapeHtml(option)+'</option>';
    }).join('')+'</select>'+hintHtml+'</div>';
  }
  if(field.type==='chips'){
    return '<div class="field"><label>'+escapeHtml(field.label)+requiredHtml+'</label><div class="chip-group">'+field.options.map(function(option){
      return '<button class="chip '+(option===value?'active':'')+'" type="button" data-chip-field="'+escapeHtml(field.key)+'" data-value="'+escapeHtml(option)+'">'+escapeHtml(option)+'</button>';
    }).join('')+'</div>'+hintHtml+'</div>';
  }
  if(field.type==='location'){
    const display=selectedLocationText||value;
    return '<div class="field"><label>'+escapeHtml(field.label)+requiredHtml+'</label><button class="picker-trigger '+(display?'':'empty')+'" type="button" data-location-picker="1"><span class="value">'+escapeHtml(display||field.placeholder||'请选择任务地点')+'</span><span class="arrow">›</span></button><div class="field-hint"></div></div>';
  }
  if(field.type==='rich-detail'){
    return '<div class="field"><label>'+escapeHtml(field.label)+requiredHtml+'</label><textarea id="detailDescriptionInput" data-field-key="'+escapeHtml(field.key)+'" maxlength="500" placeholder="'+escapeHtml(field.placeholder||'')+'">'+escapeHtml(value)+'</textarea><div class="count-row"><span></span><span id="detailCount">0/500</span></div><div class="upload-actions"><div class="upload-btn" id="detailImageBtn" role="button" tabindex="0"></div></div><div class="upload-hint">最多上传 5 张图片，用于补充现场、参考图或要求说明。</div><input id="detailImageInput" type="file" accept="image/*" multiple hidden><div class="media-list" id="detailImageList"></div></div>';
  }
  const inputType=field.type==='number'?'number':field.type;
  const minAttr=field.type==='number'?' min="0" step="0.01"':'';
  return '<div class="field"><label>'+escapeHtml(field.label)+requiredHtml+'</label><input data-field-key="'+escapeHtml(field.key)+'" type="'+inputType+'" value="'+escapeHtml(value)+'" placeholder="'+escapeHtml(field.placeholder||'')+'"'+minAttr+'>'+hintHtml+'</div>';
}

function getFieldValue(field){
  if(field.type==='chips'){
    const active=document.querySelector('[data-chip-field="'+field.key+'"].active');
    return active?active.dataset.value:'';
  }
  if(field.type==='location'){
    return String(selectedLocationText||'').trim();
  }
  if(field.type==='rich-detail'){
    const node=document.getElementById('detailDescriptionInput');
    return node?String(node.value||'').trim():'';
  }
  const node=document.querySelector('[data-field-key="'+field.key+'"]');
  return node?String(node.value||'').trim():'';
}

function buildFormData(fields){
  return fields.reduce(function(result,field){
    result[field.key]=getFieldValue(field);
    if(field.type==='location'){
      result.selectedLocationId=selectedLocationId||'';
    }
    if(field.type==='rich-detail'){
      result.detailImages=detailImages.map(function(item){return item.name;});
    }
    return result;
  },{});
}

function applyProjectMetadata(base,project){
  const category=PublishFlowConfig.getCategory(project.categoryKey);
  return Object.assign(base,{
    categoryKey:category.key,
    categoryName:category.name,
    projectKey:project.key,
    projectName:project.name,
    type:project.key,
    typeName:project.name,
    typeIcon:project.icon,
    orderTypeKey:project.orderTypeKey,
    highRisk:project.highRisk,
    riskText:project.highRisk?'高风险任务':'常规风险',
    avgRangeText:project.avgRangeText,
    insuranceDefault:project.insuranceDefault,
    insuranceName:project.insuranceName,
    insuranceFee:project.insuranceFee
  });
}

function saveProjectDraft(project){
  const nextDraft=applyProjectMetadata(Object.assign({},draft),project);
  nextDraft.formData=Object.assign({},formDataCache,{
    roughLocation:selectedLocationText,
    selectedLocationId:selectedLocationId,
    detailImages:detailImages.map(function(item){return item.name;})
  });
  nextDraft.roughLocation=selectedLocationText||nextDraft.roughLocation||'';
  nextDraft.selectedLocationId=selectedLocationId||nextDraft.selectedLocationId||'';
  nextDraft.detailImages=detailImages.map(function(item){return item.name;});
  nextDraft.validityHours=Number(nextDraft.validityHours||12);
  nextDraft.validityLabel=PublishFlowConfig.getValidityLabel(nextDraft.validityHours);
  nextDraft.selectedCouponId=nextDraft.selectedCouponId||'';
  nextDraft.urgentTopEnabled=!!nextDraft.urgentTopEnabled;
  PublishFlowConfig.writeDraft(nextDraft);
  draft=nextDraft;
}

function validateFields(fields){
  for(let i=0;i<fields.length;i+=1){
    const field=fields[i];
    const value=getFieldValue(field);
    if(field.required&&!value){
      showToast('请填写“'+field.label+'”');
      return false;
    }
    if(field.key==='reward'){
      const amount=Number(value);
      if(!Number.isFinite(amount)||amount<=0){
        showToast('请输入有效的酬劳');
        return false;
      }
    }
  }
  const start=getFieldValue({key:'startDateTime'});
  const end=getFieldValue({key:'endDateTime'});
  if(start&&end&&new Date(end)<=new Date(start)){
    showToast('任务结束时间需晚于开始时间');
    return false;
  }
  return true;
}

function buildNextDraft(){
  const project=currentProject();
  if(!project){
    showToast('请先选择任务操作');
    selectorOpen=true;
    renderSelector();
    return null;
  }
  const commonFields=getCommonFields(project);
  const extraFields=getExtraFields(project);
  if(!validateFields(commonFields.concat(extraFields)))return null;
  const formData=buildFormData(commonFields.concat(extraFields));
  formDataCache=Object.assign({},formDataCache,formData);
  const rewardValue=String(Number(formData.reward).toFixed(2));
  const durationText=deriveDurationText(formData.startDateTime,formData.endDateTime);
  const scheduleSummary=BanxingTimeUtils.formatRange(formData.startDateTime,formData.endDateTime);
  const sceneSummary=extraFields.map(function(field){
    return formData[field.key];
  }).filter(Boolean).slice(0,3);
  const nextDraft=applyProjectMetadata(Object.assign({},draft),project);
  Object.assign(nextDraft,{
    taskActions:formData.detailDescription,
    taskRequirements:formData.taskRequirements,
    startDateTime:formData.startDateTime,
    endDateTime:formData.endDateTime,
    serviceDate:String(formData.startDateTime).slice(0,10),
    serviceTime:String(formData.startDateTime).slice(11,16),
    durationText:durationText,
    scheduleSummary:scheduleSummary,
    roughLocation:formData.roughLocation,
    selectedLocationId:formData.selectedLocationId||'',
    locationSummary:formData.roughLocation,
    detailDescription:formData.detailDescription||'',
    detailImages:formData.detailImages||[],
    reward:rewardValue,
    referencePrice:project.avgRangeText,
    listTitle:PublishFlowConfig.createTaskTitle(project,formData.detailDescription,{
      durationText:durationText,
      roughLocation:formData.roughLocation
    }),
    sceneSummary:sceneSummary,
    formData:formData,
    selectedCouponId:'',
    insuranceSelected:typeof draft.insuranceSelected==='boolean'?draft.insuranceSelected:project.insuranceDefault,
    insuranceName:project.insuranceName,
    insuranceFee:project.insuranceFee,
    validityHours:Number(draft.validityHours||12),
    validityLabel:PublishFlowConfig.getValidityLabel(draft.validityHours||12)
  });
  return nextDraft;
}

    return;
  }
  const removeBtn=event.target.closest('[data-remove-image]');
  if(removeBtn){
    detailImages=detailImages.filter(function(item){return item.id!==removeBtn.dataset.removeImage;});
    renderDetailImages();
  }
});

document.getElementById('commonFields').addEventListener('input',function(event){
  if(event.target.id==='detailDescriptionInput'){
    renderDetailCount();
  }
});

document.getElementById('commonFields').addEventListener('change',function(event){
  if(event.target.id==='detailImageInput'){
    const files=Array.from(event.target.files||[]);
    const remain=5-detailImages.length;
    if(remain<=0){
      showToast('最多上传 5 张图片');
      event.target.value='';
      return;
    }
    files.slice(0,remain).forEach(function(file,index){
      detailImages.push({
        id:'img-'+Date.now()+'-'+index+'-'+Math.random().toString(16).slice(2,6),
        name:extractFileLabel(file.name,detailImages.length+1)
      });
    });
    if(files.length>remain){
      showToast('最多上传 5 张图片');
    }
    event.target.value='';
    renderDetailImages();
  }
});

document.getElementById('submitBtn').addEventListener('click',openNoticeDialog);
document.getElementById('noticeBackBtn').addEventListener('click',closeNoticeDialog);
document.getElementById('noticeMask').addEventListener('click',function(event){
  if(event.target===event.currentTarget)closeNoticeDialog();
});
document.getElementById('noticeConfirmBtn').addEventListener('click',function(){
  if(!pendingDraft)return;
  const project=currentProject();
  pendingDraft.safetyAcknowledgedAt=new Date().toISOString();
  PublishFlowConfig.writeDraft(pendingDraft);
  location.href='publish-confirm.html?project='+encodeURIComponent(project.key);
});

renderAll();
return true;
}
return runSimplifiedPublish();
})();
</script>
</body>
</html>
