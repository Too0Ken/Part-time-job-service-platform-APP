<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>信用要求 - 伴行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:375px;margin:0 auto;min-height:100vh}
.status-bar{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#333}
.nav{height:44px;background:#fff;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}.nav .back{font-size:20px;color:#333;text-decoration:none;margin-right:12px}.nav .title{font-size:16px;font-weight:600;color:#1a1a2e;flex:1;text-align:center}.nav .placeholder{width:32px}
.card{background:#fff;margin:16px;border-radius:12px;padding:24px}
.card .title{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
.card .desc{font-size:13px;color:#999;margin-bottom:24px;line-height:1.5}
.slider-area{text-align:center;margin-bottom:20px}
.slider-area .value{font-size:48px;font-weight:700;color:#FF6B35;margin-bottom:4px}
.slider-area .value small{font-size:16px;color:#999;font-weight:400}
.slider-area .label{font-size:13px;color:#999}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;background:linear-gradient(90deg,#52C41A 0%,#52C41A 40%,#FAAD14 40%,#FAAD14 70%,#FF4D4F 70%,#FF4D4F 100%);border-radius:3px;outline:none;margin:16px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#FF6B35;cursor:pointer;box-shadow:0 2px 6px rgba(255,107,53,.3)}
.tips{display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:8px}
.tip{padding:8px 12px;background:#f5f6fa;border-radius:8px;font-size:12px;color:#666;margin-top:12px;line-height:1.5}
.tip.warn{background:#FFF7E6;color:#FA8C14;border-left:3px solid #FA8C14}
.next-btn{display:block;width:calc(100% - 32px);margin:12px auto 24px;height:48px;background:linear-gradient(135deg,#FF6B35,#FF8F65);color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:500;cursor:pointer}
.next-btn:active{opacity:.85}
</style>
</head>
<body>
<div class="status-bar">9:41</div>
<div class="nav"><a href="#" class="back" id="backLink">←</a><span class="title">信用分要求</span><span class="placeholder"></span></div>
<div class="card">
  <div class="title" id="pageTitle">设置接单方信用分要求</div>
  <div class="desc" id="pageDesc">低于该分值的服务者将无法看到此任务，合理设置可获得更多接单申请。</div>
  <div class="slider-area">
    <div class="value" id="val">60<small>分</small></div>
    <div class="label">最低接单信用分</div>
  </div>
  <input type="range" id="slider" min="60" max="100" step="5" value="60" oninput="update(this.value)">
  <div class="tips"><span>60 宽松</span><span>80 适中</span><span>100 严格</span></div>
  <div class="tip warn" id="warnTip" style="display:none">⚠️ 设置较高信用分要求可能减少接单者数量</div>
  <div class="tip" id="sceneTip">💡 设置 60 分可覆盖绝大多数服务者</div>
</div>
<button class="next-btn" onclick="saveAndNext()">下一步</button>
<script>
const params=new URLSearchParams(window.location.search);
const type=params.get('type')||'waimao';
const highRiskTypes=['waimao','paopao'];
if(highRiskTypes.includes(type)&&!sessionStorage.getItem('publishSafetyConfirmed:'+type))location.replace('publish-safety.html?type='+type);
const draft=JSON.parse(localStorage.getItem('publishDraft')||'{}');
const tips={
  waimao:'💡 上门喂猫更看重守时与守规，60 分通常就能覆盖大多数合格服务者。',
  paopao:'💡 户外任务建议结合经验与信用双重筛选，70 分以上更利于降低爽约与体能不匹配风险。',
  peizhen:'💡 陪诊任务涉及流程配合，建议至少 70 分，便于筛出更稳定的服务者。',
  hunqing:'💡 婚庆任务日期重要、协作密集，建议 75 分以上，便于筛出更靠谱的预约申请者。'
};
document.getElementById('backLink').href='publish-location.html?type='+type;
document.getElementById('sceneTip').textContent=tips[type]||tips.waimao;
document.getElementById('slider').value=draft.creditRequirement||60;
update(draft.creditRequirement||60);
function update(v){document.getElementById('val').innerHTML=v+'<small>分</small>';document.getElementById('warnTip').style.display=v>=90?'block':'none'}
function saveAndNext(){
  draft.type=type;
  draft.creditRequirement=document.getElementById('slider').value;
  localStorage.setItem('publishDraft',JSON.stringify(draft));
  location.href='publish-reward.html?type='+type;
}
</script>
</body>
</html>
