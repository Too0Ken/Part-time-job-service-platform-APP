const type=params.get('type')||'cat';

const shareModal=document.getElementById('shareModal');

}

  return location.pathname.split('/').pop()+location.search;
}

function escapeHtml(text){
  return String(text||'').replace(/[&<>"']/g,function(char){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char];
  });
}

function getMaskedLocationText(text){
  const source=String(text||'').trim();
  if(!source||source==='待确认'||source==='待补充')return source||'待确认';
  return BanxingLocationUtils.getOrderLocationDisplay(source,{exactVisible:false}).text||source;
}

function normalizeTaskDuration(durationText){
  const source=String(durationText||'').trim();
  if(!source)return '';
  const cleaned=source.replace(/^约/,'');
  const hourMatch=cleaned.match(/(\d+(?:\.\d+)?)\s*小时?/);
  if(hourMatch)return hourMatch[1]+' 小时';
  const minuteMatch=cleaned.match(/(\d+)\s*分钟/);
  if(minuteMatch)return minuteMatch[1]+' 分钟';
  if(/全天/.test(cleaned))return '全天';
  if(/半天/.test(cleaned))return '半天';
  return cleaned.replace(/\s+/g,' ');
}

function extractTaskDistrict(locationText){
  const source=String(locationText||'').trim();
  if(!source)return '';
  const resolved=window.BanxingLocationUtils&&typeof BanxingLocationUtils.resolveLocation==='function'
    ?BanxingLocationUtils.resolveLocation(source)
    :null;
  const base=resolved&&resolved.region?resolved.region:source;
  const matches=String(base).match(/[^省市区县旗\s·,，/]+(?:区|县|旗|市)/g);
  if(matches&&matches.length){
    const filtered=matches.filter(function(item){
      return !/^(北京市|上海市|天津市|重庆市)$/.test(item);
    });
    return filtered[filtered.length-1]||matches[matches.length-1];
  }
  const parts=source.split(/[·,，/]/).map(function(item){
    return item.trim();
  }).filter(Boolean);
  return parts[parts.length-1]||source;
}

function formatTaskTime(text){

const taskSnapshot={

    normalizeTaskDuration(detail.info.find(function(entry){return entry[0]==='服务时长';})&&detail.info.find(function(entry){return entry[0]==='服务时长';})[1]),
    extractTaskDistrict(params.get('location')||baseTaskSnapshot.location)
  ].filter(Boolean).join('｜')||baseTaskSnapshot.title,
  time:formatTaskTime(params.get('time')||baseTaskSnapshot.time),
  location:getMaskedLocationText(params.get('location')||baseTaskSnapshot.location),
  price:params.get('price')||baseTaskSnapshot.price,

};
const returnRole=params.get('returnRole')||'';
const returnStatus=params.get('returnStatus')||'all';
const applyBtn=document.getElementById('applyBtn');

function buildQuery(obj){
  const query=new URLSearchParams();
  Object.entries(obj).forEach(([key,val])=>{
    if(val!==undefined&&val!==null&&val!=='')query.set(key,val);
  });
  return query.toString();
}

function getAppliedTaskStore(){
  try{
    return JSON.parse(localStorage.getItem('appliedTasks')||'{}');
  }catch(error){
    return {};
  }
}

function ensureSeedAppliedHistory(history){
  const list=Array.isArray(history)?history.slice():[];
  const seeds=defaultAppliedHistory();
  const hasApplying=list.some(item=>item&&item.status==='applying');
  const hasFailed=list.some(item=>item&&item.status==='failed');
  if(!hasApplying){
    list.push(seeds[0]);
  }
  if(!hasFailed){
    list.push(seeds[1]);
  }
  return list;
}

function formatTimeLabel(value){
  return BanxingTimeUtils.formatTaskTime(value)||'';
}

function readAppliedHistory(){
  let history=[];
  try{
    history=JSON.parse(localStorage.getItem('appliedTaskHistory')||'[]');
  }catch(error){
    history=[];
  }
  history=ensureSeedAppliedHistory(history);
  const legacyTasks=getAppliedTaskStore();
  Object.values(legacyTasks).forEach(item=>{
    if(!history.some(record=>record.taskId===item.taskId&&record.status===item.status)){
      history.unshift({
        recordId:'legacy-'+(item.taskId||Date.now()),
        taskId:item.taskId||'legacy-task',
        type:item.type||'cat',
        title:item.title||'已申请任务',
        time:item.time||'待确认',
        location:item.location||'待确认',
        price:item.price||'¥0',
        priceUnit:item.priceUnit||'/次',
        insurance:item.insurance||'🛡️ 已购保险',
        publisherName:item.publisherName||detail.publisher.name,
        publisherCredit:item.publisherCredit||detail.publisher.credit,
        publisherStats:item.publisherStats||detail.publisher.stats,
        status:item.status||'applying',
        appliedAtText:item.appliedAtText||formatTimeLabel(item.appliedAt),
        updatedAtText:item.updatedAtText||formatTimeLabel(item.appliedAt),
        resultNote:item.resultNote||'已提交申请，等待发布者确认。'
      });
    }
  });
  history=ensureSeedAppliedHistory(history);
  localStorage.setItem('appliedTaskHistory',JSON.stringify(history));
  return history;
}

function getLatestApplicationRecord(id){
  return readAppliedHistory().find(record=>record.taskId===id) || null;
}

function openShareModal(){

}

}

}

if(applicationStatus==='applying'){
  applyBtn.textContent='已申请，查看进度';
}
if(applicationStatus==='failed'){
  applyBtn.textContent='未接单成功，查看记录';
}
if(applicationStatus==='accepted'){
  applyBtn.textContent='已接单，查看订单';
}

applyBtn.addEventListener('click',()=>{
  if(applicationStatus==='accepted'){
    location.href='order-list.html?'+buildQuery({role:'accepted',status:'all'});
    return;
  }
  if(applicationStatus==='applying'||applicationStatus==='failed'){
    location.href='applied-order-detail.html?'+buildQuery({
      recordId:applicationRecord?applicationRecord.recordId:'',
      taskId,
      returnRole:'applied',
      returnStatus:applicationStatus==='applying'?'applied_pending':'failed'
    });
    return;
  }
  if(isAccountBlocked()){
    confirmAccountAppeal('接单');
    return;
  }
  const isHighRisk=type==='cat'||type==='outdoor';
  if(!authState.realnameVerified){
    alert('接单前需先完成实名认证。你也可以在“我的→认证中心”主动完成。');
    location.href='realname-auth.html?source=apply&type='+type;
    return;
  }
	  if(isHighRisk&&!authState.eduVerified){
	    alert('接此类任务需要学历认证，你也可以在“我的→认证中心”主动完成。');
	    location.href='edu-auth.html?source=apply&type='+type;
	    return;
	  }
	  const requiredSkillByType={health:'陪诊服务证书',education:'家教/辅导能力证明',sports:'运动陪练证书'};
	  if(requiredSkillByType[type]&&!authState.skillCertVerified){
	    alert('接此类任务需要先完成技能认证：'+requiredSkillByType[type]);
	    location.href='skill-cert.html?source=apply&type='+type;
	    return;
	  }
	  if(!authState.emergencyContactBound){
    alert('实名认证完成后，接单引导流程中必须先绑定紧急联系人。');
    location.href='emergency-contact.html?source=apply&type='+type;
    return;
  }
  location.href='safety-notice.html?'+buildQuery({
    type,
    from:fromPage,
    taskId,
    taskTitle:taskSnapshot.title,
    time:taskSnapshot.time,
    location:taskSnapshot.location,
    price:taskSnapshot.price,
    insurance:taskSnapshot.insurance,
    publisherName:detail.publisher.name,
    publisherCredit:detail.publisher.credit,
    publisherStats:detail.publisher.stats
  });
});
